<template id="tpl-arda">
  <div class="tab-nav">
    <button class="tab-btn" id="tab-arda-new" onclick="switchNewSubTab('arda','incoming')">🔔 New <span id="arda-new-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-arda-active" onclick="switchTab('arda','active')">Active <span id="arda-active-count" class="badge badge-op" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-arda-done" onclick="switchTab('arda','done')">Completed <span id="arda-done-count" class="badge badge-grey" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-arda-cancelled" onclick="switchTab('arda','cancelled')">Cancelled <span id="arda-cancelled-count" class="badge badge-down" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-subnav" id="arda-new-subtabs" style="display:none;margin-top:8px;">
    <button class="tab-btn active" id="tab-arda-new-sub-incoming" onclick="switchNewSubTab('arda','incoming')">New Transactions <span id="arda-new-incoming-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-arda-new-sub-returns" onclick="switchNewSubTab('arda','returns')">Return Transactions <span id="arda-new-returns-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
  </div>
  <div class="panel" id="arda-table-panel">
    <div class="panel-header">
      <div><div class="panel-title">Active Transactions</div><div class="panel-sub" id="arda-panel-sub"></div></div>
      <div class="panel-actions">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="arda-search" placeholder="Search…" oninput="filterRows('arda')"/></div>
        <select class="form-select" id="arda-cat-filter" onchange="filterBacCategory(this.value)" style="font-size:12.5px;padding:6px 10px;height:32px;min-width:140px;">
          <option value="All">All Categories</option>
          <option value="Regular">Regular</option>
          <option value="SPLIT">SPLIT</option>
          <option value="Agri-Agra">Agri-Agra</option>
          <option value="IPARC">IPARC</option>
        </select>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="arda-thead"><tr>
        <th>Tracking No.</th><th>Date Received</th>
        <th>Status</th><th class="th-completed-at">Completed At</th><th>Actions</th>
      </tr></thead>
      <tbody id="arda-tbody"><tr><td colspan="5"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
