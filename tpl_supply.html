<template id="tpl-supply">
  <div class="tab-nav">
    <button class="tab-btn" id="tab-supply-new" onclick="switchNewSubTab('supply','incoming')">🔔 New <span id="supply-new-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-supply-active" onclick="switchTab('supply','active')">Active <span id="supply-active-count" class="badge badge-teal" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-supply-done" onclick="switchTab('supply','done')">Completed <span id="supply-done-count" class="badge badge-grey" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-supply-cancelled" onclick="switchTab('supply','cancelled')">Cancelled <span id="supply-cancelled-count" class="badge badge-down" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-subnav" id="supply-new-subtabs" style="display:none;margin-top:8px;">
    <button class="tab-btn active" id="tab-supply-new-sub-incoming" onclick="switchNewSubTab('supply','incoming')">New Transactions <span id="supply-new-incoming-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-supply-new-sub-returns" onclick="switchNewSubTab('supply','returns')">Return Transactions <span id="supply-new-returns-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
  </div>
  <div class="panel" id="supply-table-panel">
    <div class="panel-header">
      <div><div class="panel-title">Active Transactions</div><div class="panel-sub" id="supply-panel-sub"></div></div>
      <div class="panel-actions">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="supply-search" placeholder="Search…" oninput="filterRows('supply')"/></div>
        <select class="form-select" id="supply-cat-filter" onchange="filterBacCategory(this.value)" style="font-size:12.5px;padding:6px 10px;height:32px;min-width:140px;">
          <option value="All">All Categories</option>
          <option value="Regular">Regular</option>
          <option value="SPLIT">SPLIT</option>
          <option value="Agri-Agra">Agri-Agra</option>
          <option value="IPARC">IPARC</option>
        </select>
        <button class="tb-btn btn-track-print" onclick="showExportChoice(this,function(){printDeptTable('supply');},function(){csvExportDeptTable('supply');})" title="Export table">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Export ▾
        </button>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="supply-thead"><tr>
        <th>Tracking No.</th><th>P.R No.</th><th>Date Received</th><th>End User</th><th>P.O. No.</th><th>Doc Type</th>
        <th>Supplier</th><th>Particulars</th><th>Amount</th><th>I.A.R #</th><th>Invoice #</th>
        <th>Status</th><th class="th-completed-at">Completed At</th><th>Actions</th>
      </tr></thead>
      <tbody id="supply-tbody"><tr><td colspan="14"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
