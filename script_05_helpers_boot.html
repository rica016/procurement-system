<script>
// ═══════════════════════════════════════════════════════════════════════════════
function statusBadge(s){
  if(!s||s==='—') return '<span class="badge badge-grey">—</span>';
  s=String(s).trim();
  if(s.indexOf('RETURNED TO')===0) return '<span class="badge badge-warn">'+s+'</span>';
  var map={
    'PROCESSING':'badge-blue',
    'RECEIVED':'badge-op',
    'FOR BAC':'badge-orange',
    'FORWARDED TO BAC':'badge-amber',
    'FORWARDED TO SUPPLY':'badge-teal',
    'FORWARDED TO BUDGET':'badge-violet',
    'FORWARDED TO ACCOUNTING':'badge-blue',
    'FORWARDED TO CASHIER':'badge-op',
    'RECEIVED BY BAC':'badge-amber',
    'RECEIVED BY SUPPLY':'badge-teal',
    'RECEIVED BY BUDGET':'badge-violet',
    'RECEIVED BY ACCOUNTING':'badge-blue',
    'RECEIVED BY CASHIER':'badge-op',
    'FOR SIGNATURE':'badge-warn','FOR SIGNATURE OF BUDGET OFFICER':'badge-amber',
    'FOR SIGNATURE OF ACCOUNTANT':'badge-violet','FOR CANVAS':'badge-warn',
    'FOR REVIEW':'badge-warn','FOR REVISION':'badge-warn',
    'FOR RELEASE':'badge-blue','FOR ACCEPTANCE':'badge-teal',
    'INSPECTION ONGOING':'badge-blue','PAID':'badge-op','COMPLETED':'badge-op','UNPAID':'badge-warn',
    'LACKING OF ATTACHMENTS':'badge-down','RETURNED TO REQUESTING OFFICE':'badge-warn',
    'RETURNED TO END-USER':'badge-warn','RETURNED':'badge-warn','CANCELLED':'badge-down'
  };
  return '<span class="badge '+(map[s]||'badge-grey')+'">'+s+'</span>';
}
function currency(v){
  if(!v||v==='—') return '<span style="color:var(--muted2)">—</span>';
  var n=parseFloat(String(v).replace(/[^0-9.]/g,''));
  return isNaN(n)?v:'₱'+n.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(v){ return String(v||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function esc2(v){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function emptyRow(cols){
  return '<tr><td colspan="'+cols+'"><div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No records found</div><div class="empty-sub">No transactions in this category yet.</div></div></td></tr>';
}
function errRow(cols,msg){
  return '<tr><td colspan="'+cols+'"><div style="padding:20px;color:var(--red);text-align:center;font-size:13px;">⚠ '+esc2(msg)+'</div></td></tr>';
}
function statCard(cls,icon,label,value,hint){
  return '<div class="stat-card '+cls+'"><div class="stat-stripe"></div><div class="stat-icon">'+icon+'</div>'+
         '<div class="stat-label">'+label+'</div><div class="stat-value">'+(value||0)+'</div><div class="stat-hint">'+hint+'</div></div>';
}
function breakdownPanel(title,rows){
  var html='<div class="panel"><div class="panel-header"><div class="panel-title">'+title+'</div></div><div class="panel-body"><div class="breakdown">';
  rows.forEach(function(r){
    var pct=r.total?Math.round(r.count/r.total*100):0;
    html+='<div class="bk-row"><div class="bk-label">'+r.label+'</div><div class="bk-bar-wrap"><div class="bk-bar" style="width:'+pct+'%;background:'+r.color+'"></div></div><div class="bk-count">'+r.count+'</div></div>';
  });
  return html+'</div></div></div>';
}
function formatPHTime(d){
  var ph = new Date((d||new Date()).toLocaleString('en-US',{timeZone:'Asia/Manila'}));
  var mm = String(ph.getMonth()+1).padStart(2,'0');
  var dd = String(ph.getDate()).padStart(2,'0');
  var yr = ph.getFullYear();
  var h  = ph.getHours();
  var mn = String(ph.getMinutes()).padStart(2,'0');
  var ap = h>=12?'PM':'AM';
  h = h%12||12;
  return yr+'-'+mm+'-'+dd+' '+h+':'+mn+' '+ap;
}
var _confirmCb = null;
function showConfirm(opts, cb){
  _confirmCb = cb || null;
  var type = opts.type || 'danger';
  var iconEl = document.getElementById('confm-icon');
  iconEl.className = 'confm-icon ci-' + type;
  iconEl.textContent = opts.icon || (type==='danger'?'🗑':type==='warn'?'⚠':'ℹ');
  document.getElementById('confm-title').textContent = opts.title || 'Confirm Action';
  document.getElementById('confm-msg').textContent = opts.message || '';
  var okBtn = document.getElementById('confm-ok');
  okBtn.textContent = opts.ok || 'Confirm';
  okBtn.className = 'tb-btn ' + (type==='danger'?'danger':type==='warn'?'':'primary');
  document.getElementById('confm-cancel').textContent = opts.cancel || 'Cancel';
  document.getElementById('confm-overlay').classList.add('open');
}
function hideConfirm(){
  document.getElementById('confm-overlay').classList.remove('open');
  _confirmCb = null;
}
function doConfirm(){
  document.getElementById('confm-overlay').classList.remove('open');
  if(_confirmCb){ var cb=_confirmCb; _confirmCb=null; cb(); }
}
function showToast(msg,type){
  type=type||'info';
  var tc=document.getElementById('toast');
  var el=document.createElement('div');
  el.className='toast-item toast-'+type;
  el.textContent=msg;
  tc.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },4500);
}

// ── EXPORT UTILITIES ──
function showExportChoice(btn, pdfFn, csvFn) {
  closeExportChoiceMenu();
  var menu = document.createElement('div');
  menu.id = '_export-choice';
  menu.setAttribute('style','position:fixed;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.16);z-index:99999;min-width:186px;overflow:hidden;');
  function item(icon, label, fn) {
    var el = document.createElement('button');
    el.setAttribute('style','display:flex;align-items:center;gap:10px;width:100%;padding:10px 15px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#111827;text-align:left;font-family:inherit;white-space:nowrap;');
    el.innerHTML = '<span style="font-size:16px;">'+icon+'</span><span>'+label+'</span>';
    el.onmouseenter = function(){ this.style.background='#f3f4f6'; };
    el.onmouseleave = function(){ this.style.background=''; };
    el.onclick = function(e){ e.stopPropagation(); closeExportChoiceMenu(); fn(); };
    return el;
  }
  menu.appendChild(item('📄', 'PDF (Print)', pdfFn));
  menu.appendChild(item('📊', 'Excel (.csv)', csvFn));
  document.body.appendChild(menu);
  var rect = btn.getBoundingClientRect();
  menu.style.top = (rect.bottom + 6) + 'px';
  var menuW = 186;
  menu.style.left = Math.max(8, Math.min(rect.right - menuW, window.innerWidth - menuW - 8)) + 'px';
  setTimeout(function(){ document.addEventListener('click', closeExportChoiceMenu, {once:true}); }, 0);
}
function closeExportChoiceMenu() {
  var m = document.getElementById('_export-choice');
  if (m && m.parentNode) m.parentNode.removeChild(m);
}
function csvDownload(filename, headers, rows, getCells) {
  var lines = [headers.map(csvCell).join(',')];
  rows.forEach(function(r){ lines.push(getCells(r).map(csvCell).join(',')); });
  var blob = new Blob(['﻿'+lines.join('\r\n')], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function csvCell(val) {
  var s = String(val===null||val===undefined?'':val).replace(/<[^>]*>/g,'').trim();
  return s.search(/[,"\r\n]/)>=0 ? '"'+s.replace(/"/g,'""')+'"' : s;
}

// ── PRINT DOC HELPERS ──
function _openPrintDoc(title, contentHtml, opts) {
  opts = opts || {};
  var colCount = opts.colCount || 0;
  // ultra: >15 cols — very tight, headers wrap; wide: >8 cols — landscape, compact
  var ultra = colCount > 15 || !!opts.ultra;
  var wide  = ultra || colCount > 8 || !!opts.wide;
  var now = new Date();
  var exportedAt = (typeof formatPHTime === 'function') ? formatPHTime(now) : now.toLocaleString();
  var exportedBy = (typeof currentUser !== 'undefined' && currentUser && (currentUser.fullName || currentUser.username)) || 'System';
  var e = function(s){ return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var metaItems = ['Exported by <strong>'+e(exportedBy)+'</strong>','Date <strong>'+exportedAt+'</strong>'].concat(opts.meta||[]);
  var css = '@page{size:'+(wide?'A4 landscape':'A4 portrait')+';margin:0;}'+
    '*{box-sizing:border-box;margin:0;padding:0;}'+
    'body{font-family:Segoe UI,Arial,sans-serif;font-size:11px;color:#111827;background:#fff;}'+
    '.ph{background:#14532d;color:#fff;padding:13px 22px;display:flex;align-items:center;gap:13px;}'+
    '.ph-icon{width:34px;height:34px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}'+
    '.ph-org{font-size:11px;font-weight:700;letter-spacing:.02em;}'+
    '.ph-sys{font-size:9px;opacity:.65;margin-top:2px;}'+
    '.pb{padding:16px 22px 14px;}'+
    '.pt{font-size:17px;font-weight:800;color:#111827;margin-bottom:10px;}'+
    '.pm{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:10px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:7px 13px;margin-bottom:14px;}'+
    '.pm strong{color:#374151;}'+
    '.pw{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 13px;font-size:10.5px;color:#b91c1c;font-weight:600;margin-bottom:14px;}'+
    '.ps{font-size:12px;font-weight:700;color:#374151;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid #e5e7eb;}'+
    '.ps:first-of-type{margin-top:0;}'+
    'table{width:100%;border-collapse:collapse;table-layout:fixed;}'+
    'thead{background:#14532d;}'+
    'th{padding:6px 8px;text-align:left;font-size:8px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;white-space:normal;word-break:break-word;vertical-align:top;line-height:1.3;}'+
    'td{border:1px solid #e5e7eb;padding:5px 8px;vertical-align:top;line-height:1.35;overflow-wrap:break-word;word-break:break-word;font-size:9px;}'+
    'tr:nth-child(even) td{background:#f9fafb;}'+
    '.tbl-wrap{border:1px solid #e5e7eb;border-radius:7px;overflow:hidden;margin-bottom:20px;}'+
    '.pf{margin-top:14px;padding-top:10px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;font-size:9px;color:#9ca3af;}'+
    '.pbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;padding:11px 22px;background:#f9fafb;border-top:1px solid #e5e7eb;position:sticky;bottom:0;}'+
    '.pbtn{background:#14532d;color:#fff;border:none;padding:8px 24px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.01em;}'+
    '.pbtn:hover{background:#166534;}'+
    (wide  && !ultra ? '.pt{font-size:14px;}th{font-size:7px;padding:4px 6px;}td{padding:4px 6px;font-size:8px;}' : '')+
    (ultra ? '.pt{font-size:13px;}.pb{padding:10px 14px 10px;}.pm{margin-bottom:8px;font-size:9px;}.ph{padding:8px 14px;}.ph-icon{width:26px;height:26px;font-size:13px;}th{font-size:6px;padding:2px 3px;letter-spacing:0;}td{padding:2px 3px;font-size:7px;}body{font-size:7px;}' : '')+
    '@media print{.pbar{display:none;}}';
  var html = '<!doctype html><html><head><meta charset="utf-8"><title>'+e(title)+'</title><style>'+css+'</style></head><body>'+
    '<div class="ph"><div class="ph-icon">🌾</div><div><div class="ph-org">Department of Agrarian Reform &mdash; Regional Office V</div><div class="ph-sys">Procurement Monitoring System</div></div></div>'+
    '<div class="pb"><div class="pt">'+e(title)+'</div>'+
    '<div class="pm">'+metaItems.join(' &nbsp;&middot;&nbsp; ')+'</div>'+
    (opts.warnHtml?'<div class="pw">'+opts.warnHtml+'</div>':'')+
    contentHtml+
    '<div class="pf"><span>DAR RO V &mdash; Procurement Monitoring System</span><span>'+e(title)+' &nbsp;&middot;&nbsp; '+exportedAt+'</span></div>'+
    '</div>'+
    '<div class="pbar"><button class="pbtn" onclick="window.print()">🖨&nbsp;&nbsp;Print / Save as PDF</button></div>'+
    '</body></html>';
  var w = window.open('','_blank');
  if (!w){ if(typeof showToast==='function') showToast('Please allow pop-ups to print.','error'); return null; }
  w.document.open(); w.document.write(html); w.document.close();
  w.addEventListener('afterprint', function(){ try{ w.close(); }catch(ex){} });
  w.focus(); w.print();
  return w;
}
function _buildPrintTable(headers, rows, getCells) {
  var e = function(s){ return String(s===null||s===undefined?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var thead = '<tr>'+headers.map(function(h){ return '<th>'+e(h)+'</th>'; }).join('')+'</tr>';
  var tbody = rows.length
    ? rows.map(function(r){ return '<tr>'+getCells(r).map(function(c){ return '<td>'+e(String(c===null||c===undefined?'—':c))+'</td>'; }).join('')+'</tr>'; }).join('')
    : '<tr><td colspan="'+headers.length+'" style="text-align:center;color:#9ca3af;padding:16px;">No records.</td></tr>';
  return '<div class="tbl-wrap"><table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>';
}

// ── BOOT ──
document.getElementById('login-screen').style.display='flex';
document.getElementById('app-screen').style.display='none';
</script>
