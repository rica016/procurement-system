<template id="tpl-track">
  <div class="panel">
    <div class="panel-header"><div><div class="panel-title">🔍 Transaction Tracking</div><div class="panel-sub">Search by Tracking No. to view live progress, current location, and activity history.</div></div></div>
    <div class="panel-body">
      <div class="track-toolbar">
        <input class="form-input track-input" id="track-input" placeholder="DAR-YYYY-MM-XXXX" onkeydown="if(event.key==='Enter') doTrackSearch()"/>
        <button class="tb-btn primary" onclick="doTrackSearch()">Search</button>
        <button class="tb-btn" onclick="document.getElementById('track-input').value='';document.getElementById('track-result').innerHTML='';">Clear</button>
        <button id="btn-print-timeline" class="tb-btn btn-track-print" style="display:none;" onclick="printTrackTimeline()" title="Print transaction timeline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Timeline
        </button>
      </div>
      <div id="track-result" class="track-result"></div>
    </div>
  </div>
</template>
