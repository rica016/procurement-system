function getActiveBacCategoryFilter() {
  return (typeof _bacCatFilter === 'string' && _bacCatFilter) ? _bacCatFilter : 'All';
}

function normalizeBacCategoryValue(v) {
  return String(v || '').trim().toUpperCase();
}

function rememberTransactionCategoriesFromBacRows(rows) {
  (rows || []).forEach(function(r) {
    var tn = String((r && r['TRACKING NO.']) || '').trim();
    var cat = String((r && r['CATEGORY']) || '').trim();
    if (tn && cat) transactionCategoryByTracking[tn] = cat;
  });
}

function getRowTransactionCategory(r) {
  if (!r) return '';
  var direct = String(r['CATEGORY'] || '').trim();
  if (direct) return direct;
  var tn = String(r['TRACKING NO.'] || '').trim();
  return tn ? String(transactionCategoryByTracking[tn] || '').trim() : '';
}

function rowMatchesActiveBacCategory(r) {
  var selected = getActiveBacCategoryFilter();
  if (selected === 'All') return true;
  return normalizeBacCategoryValue(getRowTransactionCategory(r)) === normalizeBacCategoryValue(selected);
}

function shouldShowMyReqsBacCategoryFilter() {
  return true;
}

function shouldShowDashboardBacCategoryFilter() {
  return true;
}

function syncBacCategoryFilterVisibility() {
  var catSel = document.getElementById('myreqs-cat-filter');
  if (catSel) catSel.style.display = shouldShowMyReqsBacCategoryFilter() ? '' : 'none';
  var activeCat = getActiveBacCategoryFilter();
  document.querySelectorAll('select[id$="-cat-filter"]').forEach(function(sel) {
    sel.value = activeCat;
  });
}

function onDashboardCatFilterChange() {
  var sel = document.getElementById('dashboard-cat-filter');
  var val = sel ? sel.value : 'All';
  _bacCatFilter = val;
  document.querySelectorAll('select[id$="-cat-filter"]').forEach(function(s) { s.value = val; });
  renderDashboardTable();
  filterDashboard();
}

function onMyReqsDeptFilterChange() {
  var sel = document.getElementById('myreqs-dept-filter');
  switchMyReqsDeptTab(sel ? sel.value : 'bac');
}

function onMyReqsCatFilterChange() {
  var sel = document.getElementById('myreqs-cat-filter');
  filterBacCategory(sel ? sel.value : 'All');
}

function ensureTransactionCategoryIndex(onReady) {
  if (getActiveBacCategoryFilter() === 'All' || Object.keys(transactionCategoryByTracking).length) {
    if (typeof onReady === 'function') onReady();
    return;
  }

  if (typeof onReady === 'function') {
    _txnCategoryIndexCallbacks.push(onReady);
  }

  if (_txnCategoryIndexLoading) return;

  function flushCategoryIndexCallbacks() {
    var pending = _txnCategoryIndexCallbacks.slice();
    _txnCategoryIndexCallbacks = [];
    pending.forEach(function(cb) {
      try { cb(); } catch (e) {}
    });
  }

  _txnCategoryIndexLoading = true;
  google.script.run
    .withSuccessHandler(function(bacRows) {
      _txnCategoryIndexLoading = false;
      rememberTransactionCategoriesFromBacRows(bacRows || []);
      flushCategoryIndexCallbacks();
    })
    .withFailureHandler(function() {
      _txnCategoryIndexLoading = false;
      flushCategoryIndexCallbacks();
    })
    .getBACData();
}

function classifyMyReqDeptRow(r) {
  var status = String(r['STATUS']||'').trim().toUpperCase();
  if (r._myReqDept === 'enduser') {
    if (status === 'CANCELLED') return 'cancelled';
    if (r['COMPLETED AT'] && String(r['COMPLETED AT']).trim() !== '') return 'done';
    if (status === 'RETURNED') return 'returned';
    return 'active';
  }
  var isNew = String(r['IS NOTIFIED']||r['IS NEW']||'').trim().toUpperCase() === 'TRUE';
  var hasReturn = String(r['RETURNED DATE']||'').trim() !== '';
  var returnDone = String(r['RETURN RECEIVED DATE']||'').trim() !== '';
  var returnTo = String(r['RETURN TO']||'').trim().toUpperCase();
  var myRole = String((typeof currentUser !== 'undefined' && currentUser && currentUser.role) || '').trim().toUpperCase();
  var toReqOffice = returnTo === 'REQUESTING OFFICE' || returnTo === 'END USER' || (myRole && returnTo === myRole);
  var isReturnedStatus = status === 'RETURNED';

  // Returned rows must stay in returned/done tabs even if legacy flags still mark them as new.
  if ((hasReturn || isReturnedStatus) && !returnDone && toReqOffice) return 'returned';
  if ((hasReturn || isReturnedStatus) && returnDone && toReqOffice) return 'done';

  if (isNew && status !== 'CANCELLED') return 'active';
  if (status === 'CANCELLED') return 'cancelled';
  if (r['COMPLETED AT'] && r['COMPLETED AT'].trim() !== '') return 'done';
  return 'active';
}

function switchMyReqsDeptTab(tab) {
  myReqsDeptTab = tab;
  ['all','enduser','bac','supply','budget','accounting','cash','rcao','arda'].forEach(function(t){
    var el = document.getElementById('tab-myreqs-dept-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  syncBacCategoryFilterVisibility();
  renderMyReqsTable(cachedMyReqs);
}

function switchMyReqsTab(tab) {
  if (tab === 'returndone') tab = 'done';
  myReqsTab = tab;
  ['active','returned','done','cancelled'].forEach(function(t){
    var el = document.getElementById('tab-myreqs-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });
  syncBacCategoryFilterVisibility();
  renderMyReqsTable(cachedMyReqs);
}

function completeReturnedMyRequest(page, rowNum) {
  openCompleteReturnedModal(SHEET_NAMES[page], rowNum, 'myreqs', page);
}

function renderMyReqsBundle(bundle) {
  if (!bundle || bundle.error) {
    renderMyReqs({ error: bundle && bundle.error ? bundle.error : 'Unable to load requests.' });
    return;
  }
  cachedMyReqs = Array.isArray(bundle.requests) ? bundle.requests : [];
  cachedMyReqDeptRows = bundle.departmentRows || { bac:[], supply:[], budget:[], accounting:[], cash:[], rcao:[], arda:[], enduser:[] };
  cachedRows['bac'] = cachedMyReqDeptRows.bac || [];
  rememberTransactionCategoriesFromBacRows(cachedRows['bac']);
  cachedRows['supply'] = cachedMyReqDeptRows.supply || [];
  cachedRows['budget'] = cachedMyReqDeptRows.budget || [];
  cachedRows['accounting'] = cachedMyReqDeptRows.accounting || [];
  cachedRows['cash'] = cachedMyReqDeptRows.cash || [];
  cachedRows['enduser'] = cachedMyReqDeptRows.enduser || [];
  syncBacCategoryFilterVisibility();
  renderMyReqsTable(cachedMyReqs);
  if (typeof allTxView !== 'undefined' && allTxView) renderAllTxTable();
}

function renderMyReqs(reqs) {
  cachedMyReqs = Array.isArray(reqs) ? reqs : [];
  cachedMyReqDeptRows = { bac:[], supply:[], budget:[], accounting:[], cash:[], rcao:[], arda:[] };
  syncBacCategoryFilterVisibility();
  renderMyReqsTable(cachedMyReqs);
}

function renderMyReqsTable(reqs) {
  var tb    = document.getElementById('myreqs-tbody');
  var sub   = document.getElementById('myreqs-sub');
  var thead = document.getElementById('myreqs-thead');
  if (!tb) return;

  var meta = MYREQS_DEPT_META[myReqsDeptTab] || MYREQS_DEPT_META.bac;

  function myReqsTrackingPrCell(r) {
    return '<td><span class="td-tracking" tabindex="0">'+esc2(r['TRACKING NO.'] || '—')+'</span></td>'+
      '<td><span class="td-pr">'+esc2(r['P.R NO.'] || r['P.R #'] || '—')+'</span></td>';
  }

  if (!reqs || reqs.error) {
    if (thead) thead.innerHTML = (myReqsDeptTab === 'all') ? meta.allHeader : '<tr><th>Tracking No.</th><th>P.R No.</th><th>Status</th></tr>';
    tb.innerHTML = '<tr><td colspan="'+((myReqsDeptTab === 'all') ? meta.allCols : 9)+'"><div style="color:var(--red);padding:20px;text-align:center;">Error loading requests.</div></td></tr>';
    return;
  }

  // Build tracking set from all requests for this end user
  var trackingSet = {};
  (reqs || []).forEach(function(r){ if (r.trackingNo) trackingSet[r.trackingNo] = true; });

  function matchingRows(key) {
    return (cachedMyReqDeptRows[key] || []).filter(function(r){
      return r['TRACKING NO.'] && trackingSet[r['TRACKING NO.']] && rowMatchesActiveBacCategory(r);
    });
  }

  // Count badges per tab — always from enduser sheet (My Requests is end-user centric)
  var tabCounts = { active:0, returned:0, done:0, cancelled:0 };
  matchingRows('enduser').forEach(function(r){
    r._myReqDept = 'enduser';
    var cat = classifyMyReqDeptRow(r);
    if (tabCounts[cat] !== undefined) tabCounts[cat]++;
  });
  Object.keys(tabCounts).forEach(function(t){
    var el = document.getElementById('myreqs-count-'+t); if (el) el.textContent = tabCounts[t];
  });

  // Active tab highlight
  ['active','returned','done','cancelled'].forEach(function(t){
    var el = document.getElementById('tab-myreqs-'+t);
    if (el) el.classList.toggle('active', t === myReqsTab);
  });

  // Dept tab counts for current status tab
  var allDeptRows = [];
  ['enduser','bac','supply','budget','accounting','cash','rcao','arda'].forEach(function(key){
    var count = matchingRows(key).filter(function(r){ r._myReqDept = key; return classifyMyReqDeptRow(r) === myReqsTab; }).length;
    var el = document.getElementById('myreqs-dept-count-'+key);
    if (el) el.textContent = count;
    allDeptRows = allDeptRows.concat((matchingRows(key) || []).filter(function(r){ r._myReqDept = key; return classifyMyReqDeptRow(r) === myReqsTab; }).map(function(r){
      r._myReqDept = key;
      return r;
    }));
  });
  var allDeptCountEl = document.getElementById('myreqs-dept-count-all');
  if (allDeptCountEl) allDeptCountEl.textContent = allDeptRows.length;

  // Declare before first use (avoid hoisting issues)
  var isReturnTab    = myReqsTab === 'returned';
  var isActiveTab    = myReqsTab === 'active';
  var isDoneTab      = myReqsTab === 'done';
  var isCancelledTab = myReqsTab === 'cancelled';
  var euMeta = MYREQS_DEPT_META.enduser;

  // All tabs use enduser rows — My Requests is always from the end-user's perspective.
  // A transaction is only "Completed" when the end user has forwarded it (COMPLETED AT set on enduser row).
  var deptRows;
  if (isReturnTab || isActiveTab || isDoneTab || isCancelledTab) {
    deptRows = matchingRows('enduser').filter(function(r){ r._myReqDept = 'enduser'; return classifyMyReqDeptRow(r) === myReqsTab; }).map(function(r){ r._myReqDept = 'enduser'; return r; });
  } else if (myReqsDeptTab === 'all') {
    deptRows = allDeptRows;
  } else {
    deptRows = matchingRows(myReqsDeptTab).filter(function(r){ r._myReqDept = myReqsDeptTab; return classifyMyReqDeptRow(r) === myReqsTab; });
  }

  var cols, theadHtml;
  if (isReturnTab) {
    cols = euMeta.returnedCols;
    theadHtml = euMeta.returnedHeader;
  } else if (isActiveTab) {
    if (myReqsDeptTab === 'all') {
      cols = (meta.allCols || meta.activeCols) + 1;
      theadHtml = (meta.allHeader || '').replace('</tr>', '<th>Actions</th></tr>');
    } else {
      cols = euMeta.activeCols;
      theadHtml = euMeta.activeHeader;
    }
  } else if (myReqsDeptTab === 'all') {
    cols = isDoneTab ? meta.allDoneCols : meta.allCols;
    theadHtml = isDoneTab ? meta.allDoneHeader : meta.allHeader;
  } else if (isDoneTab || isCancelledTab) {
    cols = euMeta.otherCols;
    theadHtml = euMeta.otherHeader;
  } else if (myReqsDeptTab === 'enduser') {
    cols = euMeta.otherCols;
    theadHtml = euMeta.otherHeader;
  } else {
    cols = meta.otherCols;
    theadHtml = meta.otherHeader;
  }
  if (thead) thead.innerHTML = theadHtml || '';

  var titleMap = { active:'Processing', returned:'End-User Returns', done:'Completed', cancelled:'Cancelled' };
  var titleEl = document.getElementById('myreqs-panel-title');
  if (titleEl) titleEl.textContent = (isActiveTab || isReturnTab || isDoneTab || isCancelledTab) ? (titleMap[myReqsTab]||'Active') : ((titleMap[myReqsTab]||'Active') + ' · ' + meta.title);
  if (sub) sub.textContent = deptRows.length + ' record' + (deptRows.length !== 1 ? 's' : '');
  // Hide dept filter for all end-user-centric tabs (always show enduser rows)
  var deptFilterEl = document.getElementById('myreqs-dept-filter');
  if (deptFilterEl) deptFilterEl.style.display = (isActiveTab || isReturnTab || isDoneTab || isCancelledTab) ? 'none' : '';
  syncBacCategoryFilterVisibility();

  if (!deptRows.length) {
    tb.innerHTML = '<tr><td colspan="'+cols+'"><div class="empty"><div class="empty-icon">📭</div>'+
      '<div class="empty-title">No records here</div>'+
      '<div class="empty-sub">No '+( titleMap[myReqsTab]||'' ).toLowerCase()+' transactions in '+meta.title+'.</div>'+
      '</div></td></tr>';
    return;
  }

  var showCompletedAt = !isActiveTab && !isReturnTab;
  var doneCls = (myReqsTab === 'done' || myReqsTab === 'cancelled') ? 'completed-row' : '';

  function myReqsIdCell(r) {
    if (myReqsDeptTab === 'bac' || myReqsDeptTab === 'all') return trackingPrCell(r);

function receiveEndUserRequest(rowNum) {
  google.script.run
    .withSuccessHandler(function(res){
      if (res && res.success) { showToast('Transaction received.', 'success'); loadData(); }
      else showToast('Error: ' + (res && res.message || 'Unknown'), 'error');
    })
    .withFailureHandler(function(e){ showToast('Error: ' + e.message, 'error'); })
    .receiveTransaction('END USER', rowNum, '', currentUser.username);
}

function reopenEndUserCompleted(rowNum, btn) {
  if (!btn) btn = event && event.target;
  var orig = btn ? btn.textContent : '';
  if (btn) { btn.textContent = 'Undoing…'; btn.disabled = true; }
  google.script.run
    .withSuccessHandler(function(res){
      if (res && res.success) {
        showToast('Transaction moved back to Processing.', 'success');
        loadData();
      } else {
        if (btn) { btn.textContent = orig; btn.disabled = false; }
        showToast('Error: ' + (res && res.message || 'Unknown'), 'error');
      }
    })
    .withFailureHandler(function(e){
      if (btn) { btn.textContent = orig; btn.disabled = false; }
      showToast('Error: ' + e.message, 'error');
    })
    .receiveTransaction('END USER', rowNum, 'Reopened from completed', currentUser.username);
}

function switchAllTxTab(tab) {

  ['active','done','cancelled'].forEach(function(t){
    var el = document.getElementById('tab-alltx-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });

function renderAllTxTable() {
  var tb    = document.getElementById('alltx-tbody');
  var thead = document.getElementById('alltx-thead');
  var subEl = document.getElementById('alltx-sub');
  if (!tb) return;

  // Build full-row lookup from dept caches (any row for a tracking no. has all cross-dept columns)
  var fullRowByTn = {};
  ['bac','supply','budget','accounting','cash','rcao','arda','enduser'].forEach(function(k) {
    (cachedMyReqDeptRows[k] || []).forEach(function(r) {
      var tn = String(r['TRACKING NO.'] || '').trim();
      if (tn && !fullRowByTn[tn]) fullRowByTn[tn] = r;
    });
  });

  // Update table header to show all columns
  var colCount = MYREQS_ALL_TX_COLUMNS.length;
  if (thead) thead.innerHTML = '<tr>'+MYREQS_ALL_TX_COLUMNS.map(function(c){ return '<th>'+esc2(c)+'</th>'; }).join('')+'</tr>';

  var catFilter = (document.getElementById('alltx-cat-filter') || {value:'All'}).value || 'All';
  var allReqs = cachedMyReqs || [];

  // Update tab counts
  var counts = { active:0, done:0, cancelled:0 };
  allReqs.forEach(function(r){
    var st = String(r.currentStatus||'').trim().toUpperCase();
    var sc = String(r.currentSection||'').trim().toUpperCase();
    if (st === 'CANCELLED') counts.cancelled++;
    else if (st === 'COMPLETED' || sc === 'COMPLETED') counts.done++;
    else counts.active++;
  });
  ['active','done','cancelled'].forEach(function(t){
    var el = document.getElementById('alltx-count-'+t);
    if (el) el.textContent = counts[t];
    var btn = document.getElementById('tab-alltx-'+t);
    if (btn) btn.classList.toggle('active', t === allTxTab);
  });

  var rows = allReqs.filter(function(r){
    var st = String(r.currentStatus||'').trim().toUpperCase();
    var sc = String(r.currentSection||'').trim().toUpperCase();
    if (catFilter !== 'All') {
      var cat = String(transactionCategoryByTracking[r.trackingNo] || '').trim();
      if (normalizeBacCategoryValue(cat) !== normalizeBacCategoryValue(catFilter)) return false;
    }
    if (allTxTab === 'active')    return st !== 'COMPLETED' && st !== 'CANCELLED' && sc !== 'COMPLETED';
    if (allTxTab === 'done')      return st === 'COMPLETED' || sc === 'COMPLETED';
    if (allTxTab === 'cancelled') return st === 'CANCELLED';
    return false;
  });

  if (subEl) subEl.textContent = rows.length + ' record' + (rows.length !== 1 ? 's' : '');

  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="'+colCount+'"><div class="empty"><div class="empty-icon">📭</div>'+
      '<div class="empty-title">No records</div>'+
      '<div class="empty-sub">No '+({active:'active',done:'completed',cancelled:'cancelled'}[allTxTab]||'')+' transactions found.</div></div></td></tr>';
    return;
  }

  tb.innerHTML = rows.map(function(r){
    var tn = String(r.trackingNo || '').trim();
    var fullRow = fullRowByTn[tn] || {};
    return '<tr>'+MYREQS_ALL_TX_COLUMNS.map(function(col){
      if (col === 'TRACKING NO.') return '<td><span class="td-tracking">'+esc2(tn||'—')+'</span></td>';
      if (col === 'P.R NO.')      return '<td><span class="td-pr">'+esc2(r.prNo || fullRow[col] || '—')+'</span></td>';
      if (col === 'CURRENT DEPT') {
        var dept = String(r.currentSection || fullRow[col] || '').trim();
        if (dept.toUpperCase() === 'END USER') dept = 'Requesting Office';
        return '<td>'+esc2(dept||'—')+'</td>';
      }
      if (col === 'CURRENT STATUS') return '<td>'+statusBadge(r.currentStatus || fullRow['STATUS'] || '—')+'</td>';
      if (DASHBOARD_ALL_TX_CURRENCY[col]) return '<td>'+currency(fullRow[col])+'</td>';
      if (col === 'PARTICULARS') return '<td class="td-wrap">'+esc2(fullRow[col]||'—')+'</td>';
      return '<td>'+esc2(fullRow[col]||'—')+'</td>';
    }).join('')+'</tr>';
  }).join('');
}

function _getAllTxExportSpec() {
  var fullRowByTn = {};
  ['bac','supply','budget','accounting','cash','rcao','arda','enduser'].forEach(function(k) {
    (cachedMyReqDeptRows[k] || []).forEach(function(r) {
      var tn = String(r['TRACKING NO.'] || '').trim();
      if (tn && !fullRowByTn[tn]) fullRowByTn[tn] = r;
    });
  });
  var catFilter = ((document.getElementById('alltx-cat-filter') || {}).value) || 'All';
  var tab = (typeof allTxTab !== 'undefined') ? allTxTab : 'active';

  var rows = (cachedMyReqs || []).filter(function(r) {
    var st = String(r.currentStatus||'').trim().toUpperCase();
    var sc = String(r.currentSection||'').trim().toUpperCase();
    if (catFilter !== 'All') {
      var cat = String(transactionCategoryByTracking[r.trackingNo] || '').trim();
      if (normalizeBacCategoryValue(cat) !== normalizeBacCategoryValue(catFilter)) return false;
    }
    if (tab === 'active')    return st !== 'COMPLETED' && st !== 'CANCELLED' && sc !== 'COMPLETED';
    if (tab === 'done')      return st === 'COMPLETED' || sc === 'COMPLETED';
    if (tab === 'cancelled') return st === 'CANCELLED';
    return false;
  });

  var qEl = document.getElementById('alltx-search');
  var q = (qEl ? qEl.value : '').toLowerCase();
  if (q) {
    rows = rows.filter(function(r) {
      var tn = String(r.trackingNo||'');
      var fullRow = fullRowByTn[tn] || {};
      var text = [tn, r.prNo||''].concat(Object.keys(fullRow).map(function(k){ return String(fullRow[k]||''); })).join(' ').toLowerCase();
      return text.indexOf(q) !== -1;
    });
  }

  var TAB_LABELS = {active:'Active', done:'Completed', cancelled:'Cancelled'};
  var title = 'All My Transactions — ' + (TAB_LABELS[tab] || 'Active');

  var headers = MYREQS_ALL_TX_COLUMNS.map(function(c) {
    if (c === 'CURRENT DEPT')   return 'Current Department';
    if (c === 'CURRENT STATUS') return 'Status';
    return c.split(' ').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase(); }).join(' ');
  });

  var getCells = function(r) {
    var tn = String(r.trackingNo||'').trim();
    var fullRow = fullRowByTn[tn] || {};
    return MYREQS_ALL_TX_COLUMNS.map(function(col) {
      if (col === 'TRACKING NO.')  return tn || '—';
      if (col === 'P.R NO.')       return r.prNo || fullRow[col] || '—';
      if (col === 'CURRENT DEPT') {
        var dept = String(r.currentSection || fullRow[col] || '').trim();
        return dept.toUpperCase() === 'END USER' ? 'Requesting Office' : (dept || '—');
      }
      if (col === 'CURRENT STATUS') return r.currentStatus || fullRow['STATUS'] || '—';
      return fullRow[col] || '—';
    });
  };

  return { title: title, headers: headers, rows: rows, getCells: getCells };
}

function printAllTxTable() {
  var spec = _getAllTxExportSpec();
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  _openPrintDoc(spec.title, _buildPrintTable(spec.headers, spec.rows, spec.getCells), {
    colCount: spec.headers.length,
    meta: [spec.rows.length+' record'+(spec.rows.length!==1?'s':'')]
  });
}

function csvExportAllTxTable() {
  var spec = _getAllTxExportSpec();
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  var safeTitle = spec.title.replace(/[^A-Za-z0-9 ]/g,'').replace(/\s+/g,'-');
  csvDownload('DAR-RO5-'+safeTitle+'.csv', spec.headers, spec.rows, spec.getCells);
}

var lastTrackSearchResult = null;

function printTrackTimeline() {
  if (!lastTrackSearchResult) { showToast('Search a transaction first.','info'); return; }
  var res = lastTrackSearchResult;
  var labels = {BAC:'BAC','SUPPLY AND PROPERTY':'Supply & Property',BUDGET:'Budget',ACCOUNTING:'Accounting',CASH:'Cashier',RCAO:'RCAO',ARDA:'ARDA','END USER':'Requesting Office'};
  var isCompleted = String(res.currentStatus||'').trim().toUpperCase() === 'COMPLETED';
  var currentSection = labels[res.currentSection] || res.currentSection || '—';

  var timelineTable = _buildPrintTable(
    ['Section','Status','Date'],
    res.timeline || [],
    function(t){ return [labels[t.section]||t.section||'—', t.status||(t.reached?'Reached':'Pending'), t.completedAt||t.returnedDate||'—']; }
  );
  var historyTable = _buildPrintTable(
    ['Action','From → To','User','Timestamp','Remarks'],
    res.history || [],
    function(h){
      var flow = (h['FROM']&&h['TO']) ? h['FROM']+' → '+h['TO'] : (h['FROM']||h['TO']||'—');
      return [h['ACTION']||'—', flow, h['USER']||'—', h['TIMESTAMP']||'—', h['REMARKS']||'—'];
    }
  );
  var contentHtml = '<div class="ps">Timeline</div>'+timelineTable+'<div class="ps">Activity Log</div>'+historyTable;

    'Tracking No. <strong>'+esc2(res.trackingNo||'—')+'</strong>',
    'Status <strong>'+esc2(res.currentStatus||'—')+'</strong>'
  ];
  if (!isCompleted) metaItems.push('Current Location <strong>'+esc2(currentSection)+'</strong>');
  if (res.office) metaItems.push(esc2(res.office));
  _openPrintDoc('Transaction Timeline', contentHtml, {meta: metaItems});
}

function csvExportTrackTimeline() {
  if (!lastTrackSearchResult) { showToast('Search a transaction first.','info'); return; }
  var res = lastTrackSearchResult;
  var now = new Date();
  var safeNo = String(res.trackingNo||'').replace(/[^A-Z0-9-]/gi,'');
  var filename = 'DAR-RO5-Timeline-'+safeNo+'.csv';
  var lines = [];
  lines.push(['TIMELINE'].map(csvCell).join(','));
  lines.push(['Section','Status','Date'].map(csvCell).join(','));
  (res.timeline||[]).forEach(function(t){
    lines.push([t.section||'', t.status||(t.reached?'Reached':'Pending'), t.completedAt||t.returnedDate||''].map(csvCell).join(','));
  });
  lines.push('');
  lines.push(['ACTIVITY LOG'].map(csvCell).join(','));
  lines.push(['Action','From','To','User','Timestamp','Remarks'].map(csvCell).join(','));
  (res.history||[]).forEach(function(h){
    lines.push([h['ACTION']||'',h['FROM']||'',h['TO']||'',h['USER']||'',h['TIMESTAMP']||'',h['REMARKS']||''].map(csvCell).join(','));
  });
  var blob = new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function doTrackSearch(){
  var q   = (document.getElementById('track-input').value||'').trim();
  var out = document.getElementById('track-result');
  if (!q){ lastTrackSearchResult = null; out.innerHTML=''; return; }
  out.innerHTML='<div class="loading"><div class="spinner"></div> Searching…</div>';
  google.script.run
    .withSuccessHandler(function(res){
      if (!res){
        lastTrackSearchResult = null;
        out.innerHTML='<div class="track-empty"><div class="track-empty-icon">🔎</div><div class="track-empty-title">No transaction found</div><div class="track-empty-sub">No match for <strong>"'+esc2(q)+'"</strong>.</div></div>';
        return;
      }
      if (res.error){ lastTrackSearchResult = null; out.innerHTML='<div class="track-error">⚠ '+esc2(res.error)+'</div>'; return; }
      lastTrackSearchResult = res;
      var icons ={'BAC':'📋','SUPPLY AND PROPERTY':'📦','BUDGET':'💰','ACCOUNTING':'🧾','CASH':'💳','RCAO':'🗂️','ARDA':'🛡️','END USER':'🏢'};
      var labels={'BAC':'BAC','SUPPLY AND PROPERTY':'Supply & Property','BUDGET':'Budget','ACCOUNTING':'Accounting','CASH':'Cashier','RCAO':'RCAO','ARDA':'ARDA','END USER':'Requesting Office'};

      var timeline = Array.isArray(res.timeline) ? res.timeline : [];

      // Prepend Requesting Office if the server didn't include it
      var hasEndUser = timeline.some(function(t){ return t.section === 'END USER'; });
      if (!hasEndUser) {
        // displayDepartmentName converts END USER → 'Requesting Office', so match that
        var euHist = (res.history || []).filter(function(h) {
          return String(h['FROM']||'').toUpperCase() === 'REQUESTING OFFICE' ||
                 String(h['TO']||'').toUpperCase()   === 'REQUESTING OFFICE';
        });
        var overallStatus = String(res.currentStatus || '').toUpperCase();
        var euIsCompleted = overallStatus === 'COMPLETED' || overallStatus === 'PAID';
        var euIsProcessing = String(res.currentSection || '').toUpperCase() === 'END USER';
        var euIsReceived = euHist.some(function(h){
          return String(h['TO']||'').toUpperCase() === 'REQUESTING OFFICE';
        });

        var euStep;
        if (euIsCompleted) {
          euStep = { section:'END USER', reached:true, completed:true,  status:'Completed' };
        } else if (euIsProcessing) {
          euStep = { section:'END USER', reached:true, completed:false, status:'Processing' };
        } else if (euIsReceived) {
          euStep = { section:'END USER', reached:true, completed:false, status:'Received' };
        } else {
          euStep = { section:'END USER', reached:true, completed:true,  status:'Request Submitted' };
        }
        timeline = [euStep].concat(timeline);
      }

      var reachedCount = timeline.filter(function(t){ return !!t.reached; }).length;
      var completedCount = timeline.filter(function(t){ return !!t.completed; }).length;
      var pendingCount = Math.max(0, timeline.length - reachedCount);

      var tlHTML = timeline.map(function(t){
        var cls = t.completed ? 'done' : (t.reached ? 'active' : 'pending');
        return '<div class="tl-item tl-'+cls+'">'+
          '<div class="tl-icon '+cls+'">'+(t.completed?'✓':(t.reached?'●':'○'))+'</div>'+
          '<div class="tl-content">'+
            '<div class="tl-top"><div class="tl-section">'+(icons[t.section]||'📝')+' '+(labels[t.section]||t.section)+'</div><span class="tl-chip '+cls+'">'+(t.completed?'Completed':(t.reached?'In Progress':'Pending'))+'</span></div>'+
            '<div class="tl-status '+cls+'">'+(t.reached?(t.status||'—'):'Not yet reached')+'</div>'+
            '<div class="tl-meta-stack">'+
              (t.returnedFrom?'<div class="tl-time">Returned From: '+esc2(t.returnedFrom)+'</div>':'')+
              (t.returnRemarks?'<div class="tl-time">Return From Remarks: '+esc2(t.returnRemarks)+'</div>':'')+
              (t.returnReceivedRemarks?'<div class="tl-time">Return To Remarks: '+esc2(t.returnReceivedRemarks)+'</div>':'')+
              (t.completedAt?'<div class="tl-time">Completed: '+esc2(t.completedAt)+'</div>':'')+
              (t.returnedDate?'<div class="tl-time">Returned: '+esc2(t.returnedDate)+'</div>':'')+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('');

      var histHTML = '';
      if (res.history && res.history.length) {
        var evtCls  = {'CREATED':'evt-create','FORWARDED':'evt-forward','RECEIVED':'evt-received','RETURNED':'evt-return','RETURN DONE':'evt-returndone','RETURN CONTINUE':'evt-returncont','PAID':'evt-paid','COMPLETED':'evt-paid','CANCELLED':'evt-cancel'};
        var evtIcon = {'CREATED':'＋','FORWARDED':'→','RECEIVED':'📥','RETURNED':'↩','RETURN DONE':'✔','RETURN CONTINUE':'▶','PAID':'✓','COMPLETED':'✓','CANCELLED':'✗'};
        histHTML = '<div class="track-history">'+
          '<div class="track-history-title">Activity Log</div>'+
          res.history.map(function(h){
            var act  = String(h['ACTION']||'');
            var cls  = evtCls[act]  || 'evt-default';
            var icon = evtIcon[act] || '●';
            var flow = (h['FROM']&&h['TO'])
              ? '<span class="evt-flow">'+esc2(h['FROM'])+'<span class="evt-arrow"> → </span>'+esc2(h['TO'])+'</span>'
              : ((h['FROM']||h['TO']) ? '<span class="evt-flow">'+esc2(h['FROM']||h['TO'])+'</span>' : '');
            return '<div class="track-evt '+cls+'">'+
              '<div class="evt-dot">'+icon+'</div>'+
              '<div class="evt-body">'+
                '<div class="evt-header">'+
                  '<span class="evt-action">'+esc2(act)+'</span>'+
                  (flow ? ' '+flow : '')+
                  (h['USER'] ? '<span class="evt-user">'+esc2(h['USER'])+'</span>' : '')+
                '</div>'+
                '<div class="evt-time">'+esc2(h['TIMESTAMP']||'')+'</div>'+
                (h['REMARKS'] ? '<div class="evt-remarks">'+esc2(h['REMARKS'])+'</div>' : '')+
              '</div>'+
            '</div>';
          }).join('')+
        '</div>';
      }

      var headerMeta = esc2(res.office||'—') + (res.item ? ' · ' + esc2(res.item) : '');
      var currentSection = labels[res.currentSection] || res.currentSection || '—';
      out.innerHTML='<div class="track-shell">'+
        '<div class="track-card">'+
          '<div class="track-header">'+
            '<div>'+ 
              '<div class="track-title">'+(res.trackingNo||'—')+'</div>'+ 
              '<div class="track-meta">'+headerMeta+'</div>'+
            '</div>'+
            '<div class="track-header-right">'+
              '<div class="track-header-status">'+statusBadge(res.currentStatus||'—')+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="track-kpis">'+
            '<div class="track-kpi"><div class="track-kpi-label">Steps</div><div class="track-kpi-value">'+timeline.length+'</div></div>'+
            '<div class="track-kpi"><div class="track-kpi-label">Reached</div><div class="track-kpi-value">'+reachedCount+'</div></div>'+
            '<div class="track-kpi"><div class="track-kpi-label">Completed</div><div class="track-kpi-value">'+completedCount+'</div></div>'+
            '<div class="track-kpi"><div class="track-kpi-label">Pending</div><div class="track-kpi-value">'+pendingCount+'</div></div>'+
          '</div>'+
          '<div class="track-body">'+
            '<div class="track-current">'+
              '<div class="track-current-block">'+
                '<div class="track-current-label">Current Location</div>'+
                '<div class="track-current-val">'+(icons[res.currentSection]||'📝')+' '+currentSection+'</div>'+
              '</div>'+
              '<div class="track-current-notes">'+
                (res.currentReturnRemarks?'<div class="track-note"><div class="track-note-label">Return From Remarks</div><div class="track-note-text">'+esc2(res.currentReturnRemarks)+'</div></div>':'')+
                (res.currentReturnReceivedRemarks?'<div class="track-note"><div class="track-note-label">Return To Remarks</div><div class="track-note-text">'+esc2(res.currentReturnReceivedRemarks)+'</div></div>':'')+
              '</div>'+
            '</div>'+
            '<div class="timeline">'+tlHTML+'</div>'+
            histHTML+
          '</div>'+
        '</div>'+
      '</div>';
    })
    .withFailureHandler(function(e){ lastTrackSearchResult = null; out.innerHTML='<div class="track-error">Error: '+esc2(e.message)+'</div>'; })
    .searchTransaction(q);
}

var DASHBOARD_RETURN_TARGETS = { bac:'BAC', supply:'Supply', budget:'Budget', accounting:'Accounting', cash:'Cashier', rcao:'RCAO', arda:'ARDA', enduser:'END USER' };

function isRequestingOfficeTarget(value) {
  var v = String(value || '').trim().toUpperCase();
  return v === 'REQUESTING OFFICE' || v === 'END USER';
}

function rebuildDashboardRequestingOfficeRows() {
  var sourceDepts = ['bac','supply','budget','accounting','cash','rcao','arda'];
  var out = [];
  sourceDepts.forEach(function(dept){
    (cachedDashboardData[dept] || []).forEach(function(r){
      if (!isRequestingOfficeTarget(r['RETURN TO'])) return;
      var copy = Object.assign({}, r);
      copy._dashSourceDept = dept;
      out.push(copy);
    });
  });
  cachedDashboardData.enduser = out;
}

function dashboardIsReturnPending(r) {
  var status = String(r['STATUS']||'').trim().toUpperCase();
  if (status === 'PROCESSING') return false;
  return String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()==='';
}

function dashboardRowCategory(page, r) {
  var status = String(r['STATUS']||'').trim().toUpperCase();
  // Enduser rows are already filtered to CURRENT DEPT = END USER — classify by completion
  if (page === 'enduser') {
    var hasCompletedAt = String(r['COMPLETED AT'] || '').trim() !== '';
    var hasReturnReceived = String(r['RETURN RECEIVED DATE'] || '').trim() !== '';
    if (hasCompletedAt || hasReturnReceived || status === 'PAID' || status === 'COMPLETED') return 'completed';
    return 'returned'; // "not taken" maps to 'returned' render tab
  }
  var isNotified = String(r['IS NOTIFIED']||r['IS NEW']||'').trim().toUpperCase() === 'TRUE';
  var isPendingReturn = dashboardIsReturnPending(r);
  var hasResolvedReturn = String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()!=='';
  var returnToValue = String(r['RETURN TO']||'').trim();
  var isReturnedToPage = returnToValue.toUpperCase() === String(DASHBOARD_RETURN_TARGETS[page] || '').trim().toUpperCase();
  if (isReturnedToPage && isPendingReturn) return 'returned';
  if (isReturnedToPage && hasResolvedReturn) return 'completed';
  if (status === 'CANCELLED') return 'cancelled';
  if (isPendingReturn) return 'returned';
  if ((r['COMPLETED AT'] && r['COMPLETED AT'].trim() !== '') || status === 'PAID' || status === 'COMPLETED') return 'completed';
  if (isNotified) return 'active';
  return 'active';
}

function dashboardRowsForTab(page, tab) {
  var rows = cachedDashboardData[page] || [];
  if (tab === 'all') return rows;
  return rows.filter(function(r){ return dashboardRowCategory(page, r) === tab; });
}

function renderDashboardAnalytics() {
  var bac = cachedDashboardData.bac  || [];
  var sup = cachedDashboardData.supply || [];
  var bud = cachedDashboardData.budget || [];
  var acc = cachedDashboardData.accounting || [];
  var rco = cachedDashboardData.rcao || [];
  var ard = cachedDashboardData.arda || [];
  var csh = cachedDashboardData.cash || [];

  function isRP(r){ return String(r['RETURNED DATE']||'').trim()!==''&&String(r['RETURN RECEIVED DATE']||'').trim()===''; }
  function isComp(r){
    var st = String(r['STATUS'] || '').toUpperCase();
    return !!(r['COMPLETED AT'] && r['COMPLETED AT'].trim() !== '') || st === 'PAID' || st === 'COMPLETED';
  }

  // ── Global cross-dept stats ──
  var uniqueTN={}, cancelledTN={}, returnedTN={}, paidTN={};
  [bac,sup,bud,acc,rco,ard,csh,cachedDashboardData.enduser||[]].forEach(function(rows){
    rows.forEach(function(r){
      var tn=r['TRACKING NO.']; if(!tn) return;
      uniqueTN[tn]=true;
      if(String(r['STATUS']||'').toUpperCase()==='CANCELLED') cancelledTN[tn]=true;
      var st = String(r['STATUS'] || '').toUpperCase();
      if (st === 'PAID' || st === 'COMPLETED') paidTN[tn]=true;
      if(isRP(r)) returnedTN[tn]=true;
    });
  });

  var total     = Object.keys(uniqueTN).length;
  var paid      = Object.keys(paidTN).length;
  var cancelled = Object.keys(cancelledTN).length;
  var returned  = Object.keys(returnedTN).length;
  var inProg    = Math.max(0, total - paid - cancelled);

  // ── Stat Grid ──
  var sgEl = document.getElementById('dashboard-stat-grid');
  if(sgEl){
    var cards=[
      {cls:'s-blue',  icon:'📁', label:'Total Transactions', val:total,     hint:'Unique tracking numbers',        tab:'active'},
      {cls:'s-amber', icon:'⚙', label:'In Progress',        val:inProg,    hint:'Excluding paid &amp; cancelled', tab:'active'},
      {cls:'s-orange',icon:'↩', label:'Returned',           val:returned,  hint:'Pending return — all depts',     tab:'returned'},
      {cls:'s-green', icon:'✅', label:'Completed',          val:paid,      hint:'Marked completed by Cashier',    tab:'completed'},
      {cls:'s-red',   icon:'✕', label:'Cancelled',          val:cancelled, hint:'Cancelled transactions',          tab:'cancelled'}
    ];
    sgEl.innerHTML=cards.map(function(c){
      return '<div class="stat-card '+c.cls+'" onclick="switchDashboardTab(\''+c.tab+'\')">'+
        '<div class="stat-stripe"></div><div class="stat-icon">'+c.icon+'</div>'+
        '<div class="stat-label">'+c.label+'</div><div class="stat-value">'+c.val+'</div>'+
        '<div class="stat-hint">'+c.hint+'</div></div>';
    }).join('');
  }

  // ── Pipeline ──
  var deptDef=[
    {key:'bac',        label:'BAC',              color:'var(--amber)', rows:bac},
    {key:'supply',     label:'Supply & Property',color:'var(--teal)',  rows:sup},
    {key:'budget',     label:'Budget',            color:'var(--violet)',rows:bud},
    {key:'accounting', label:'Accounting',        color:'var(--blue)',  rows:acc},
    {key:'rcao',       label:'RCAO',              color:'var(--orange)',rows:rco},
    {key:'arda',       label:'ARDA',              color:'var(--green)', rows:ard},
    {key:'cash',       label:'Cashier',           color:'var(--green)', rows:csh},
    {key:'enduser',    label:'Requesting Offices',color:'var(--orange)',rows:cachedDashboardData.enduser || []}
  ];
  var maxLoad = 1;
  var dStats = deptDef.map(function(d){
    var act = 0, ret = 0, done = 0;
    d.rows.forEach(function(r){
      var cat = dashboardRowCategory(d.key, r);
      if (cat === 'active') act++;
      else if (cat === 'returned') ret++;
      else if (cat === 'completed') done++;
    });
    var load = d.key === 'enduser' ? ret : act;
    if(load > maxLoad) maxLoad = load;
    return {key:d.key, label:d.label, color:d.color, total:d.rows.length, active:act, returned:ret, done:done, load:load};
  });

  var pipeEl = document.getElementById('dashboard-pipeline');
  if(pipeEl){
    function pipelineBarColor(colorVar) {
      var c = String(colorVar || '').toLowerCase();
      if (c.indexOf('red') !== -1) return 'var(--blue)';
      return colorVar || 'var(--blue)';
    }
    pipeEl.innerHTML = '<div class="pipeline-list">'+dStats.map(function(ds){
      var pct = Math.round(ds.load / maxLoad * 100);
      var primaryCount = ds.key === 'enduser' ? ds.returned : ds.active;
      var primaryLabel = ds.key === 'enduser' ? 'not taken' : 'active';
      return '<div class="pipeline-dept" onclick="switchDashboardDeptTab(\''+ds.key+'\')">'+
        '<div class="pipeline-dept-left">'+
          '<div class="pipeline-dept-name">'+ds.label+'</div>'+
          '<div class="pipeline-dept-sub">'+ds.total+' total row'+(ds.total!==1?'s':'')+'</div>'+
        '</div>'+
        '<div class="pipeline-dept-right">'+
          '<div class="pipeline-bar-wrap"><div class="pipeline-bar-fill" style="width:'+pct+'%;background:'+pipelineBarColor(ds.color)+'"></div></div>'+
          '<div class="pipeline-metrics">'+
            '<span class="pm pm-active">'+primaryCount+' '+primaryLabel+'</span>'+
            (ds.key !== 'enduser' && ds.returned?'<span class="pm pm-returned">'+ds.returned+' returned</span>':'')+
            '<span class="pm pm-done">'+ds.done+' done</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('')+'</div>';
  }

  // ── Needs Attention (stale items: 7+ days without update on current dept) ──
  var STALE_DAYS = 7;
  var DAY_MS = 24 * 60 * 60 * 1000;

  function parseDashboardDate(v) {
    if (!v || String(v).trim() === '' || String(v).trim() === '—') return null;
    var raw = String(v).trim();
    var d = new Date(raw);
    if (!isNaN(d.getTime())) return d;
    var iso = toDateInput(raw);
    if (!iso) return null;
    d = new Date(iso + 'T00:00:00');
    return isNaN(d.getTime()) ? null : d;
  }

  function getDeptStaleCategory(deptKey, row) {
    var cat = dashboardRowCategory(deptKey, row);
    if (cat === 'active' || cat === 'returned') return cat;
    return null;
  }

  function ageInDays(d) {
    return Math.floor((Date.now() - d.getTime()) / DAY_MS);
  }

  var staleItems = [];
  deptDef.forEach(function(d){
    if (d.key === 'enduser') return;
    d.rows.forEach(function(r){
      var cat = getDeptStaleCategory(d.key, r);
      if (!cat) return;
      var tn = String(r['TRACKING NO.'] || '').trim().toUpperCase();
      var lastActivityRaw = tn ? dashboardLastActivityByTracking[tn] : '';
      var refDate = parseDashboardDate(lastActivityRaw) || parseDashboardDate(r['DATE RECEIVED']) || parseDashboardDate(r['RETURNED DATE']);
      if (!refDate) return;
      var daysOld = ageInDays(refDate);
      if (daysOld < STALE_DAYS) return;
      staleItems.push({
        deptKey:d.key,
        deptLabel:d.label,
        row:r,
        lastActivityRaw:lastActivityRaw,
        daysOld:daysOld,
        tab:(cat === 'returned' ? 'returned' : 'active')
      });
    });
  });

  staleItems.sort(function(a,b){ return b.daysOld - a.daysOld; });

  var alertsSubEl = document.getElementById('dashboard-alerts-sub');
  if(alertsSubEl) alertsSubEl.textContent = staleItems.length+' stale transaction'+(staleItems.length!==1?'s':'')+' (7+ days no update)';

  var alertsEl = document.getElementById('dashboard-alerts');
  if(alertsEl){
    if(!staleItems.length){
      alertsEl.innerHTML='<div style="padding:28px;text-align:center;color:var(--muted);">'+
        '<div style="font-size:32px;margin-bottom:8px;">✅</div>'+
        '<div style="font-weight:700;font-size:13px;">All clear!</div>'+
        '<div style="font-size:12px;margin-top:4px;">No stale transactions (7+ days) in current departments.</div></div>';
    } else {
      alertsEl.innerHTML = staleItems.map(function(item){
        var r = item.row;
        var stateLabel = item.tab === 'returned' ? 'Not Taken' : 'In Progress';
        var lastActivityTimestamp = (item.lastActivityRaw && item.lastActivityRaw.timestamp) ? item.lastActivityRaw.timestamp : (r['DATE RECEIVED']||r['RETURNED DATE']||'—');
        return '<div class="db-alert-item stale-flash" onclick="switchDashboardDeptTab(\''+item.deptKey+'\');switchDashboardTab(\''+item.tab+'\');">'+
          '<div class="db-alert-hdr">'+
            '<span class="td-pr">'+esc2(r['TRACKING NO.']||'—')+'</span>'+
            ((r['P.R NO.']||r['P.R #'])?'<span class="td-tracking"> · '+esc2(r['P.R NO.']||r['P.R #'])+'</span>':'')+
            '<span class="db-alert-dept db-dept-'+item.deptKey+'">'+esc2(item.deptLabel)+'</span>'+
          '</div>'+
          '<div class="db-alert-meta">'+item.daysOld+' day'+(item.daysOld!==1?'s':'')+' no update · '+stateLabel+'</div>'+
          '<div class="db-alert-remarks">At '+esc2(item.deptLabel)+' · last activity: '+esc2(lastActivityTimestamp)+'</div>'+ 
        '</div>';
      }).join('');
    }
  }
}

function renderDashboardTable() {
  var tb  = document.getElementById('dashboard-tbody');
  var sub = document.getElementById('dashboard-sub');
  var thead = document.getElementById('dashboard-thead');
  if (!tb) return;
  syncDashboardEnduserSubTabsVisibility();

  var dashboardRenderTab = dashboardTab;
  if (dashboardDeptTab === 'enduser') {
    dashboardRenderTab = dashboardEnduserSubTab === 'done' ? 'completed' : 'returned';
  }

  function rowsFor(page, tab) {
    return dashboardRowsForTab(page, tab).filter(rowMatchesActiveBacCategory);
  }

  function parseDashboardSortDate(raw) {
    if (!raw) return null;
    if (raw instanceof Date) return isNaN(raw.getTime()) ? null : raw;
    if (typeof raw === 'object' && raw.timestamp) raw = raw.timestamp;
    var s = String(raw || '').trim();
    if (!s || s === '—') return null;
    var d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    var iso = toDateInput(s);
    if (!iso) return null;
    d = new Date(iso + 'T00:00:00');
    return isNaN(d.getTime()) ? null : d;
  }

  function rowActivityMillis(r) {
    var tn = String(r['TRACKING NO.'] || '').trim().toUpperCase();
    var latest = tn ? dashboardLastActivityByTracking[tn] : null;
    var d = parseDashboardSortDate(latest) ||
            parseDashboardSortDate(r['COMPLETED AT']) ||
            parseDashboardSortDate(r['RETURN RECEIVED DATE']) ||
            parseDashboardSortDate(r['RETURNED DATE']) ||
            parseDashboardSortDate(r['DATE RECEIVED']);
    return d ? d.getTime() : 0;
  }

  var allDepts = ['bac','supply','budget','accounting','rcao','arda','cash','enduser'];
  var display;
  if (dashboardDeptTab === 'all') {
    var allRows = [];
    var _seenTracking = {};
    allDepts.forEach(function(dept){
      var deptRows = rowsFor(dept, dashboardTab);
      deptRows.forEach(function(r){ r._dashDept = dept; });
      allRows = allRows.concat(deptRows);
    });
    display = allRows.filter(function(r) {
      var tn = String(r['TRACKING NO.'] || '').trim();
      if (!tn) return true;
      if (_seenTracking[tn]) return false;
      _seenTracking[tn] = true;
      return true;
    });
    display.sort(function(a, b) {
      var am = rowActivityMillis(a);
      var bm = rowActivityMillis(b);
      if (bm !== am) return bm - am;
      var at = String(a['TRACKING NO.'] || '').trim();
      var bt = String(b['TRACKING NO.'] || '').trim();
      if (at !== bt) return at < bt ? -1 : 1;
      var ad = String(a._dashDept || '').trim();
      var bd = String(b._dashDept || '').trim();
      return ad < bd ? -1 : (ad > bd ? 1 : 0);
    });
  } else if (dashboardDeptTab === 'enduser') {
    display = rowsFor('enduser', dashboardRenderTab);
  } else {
    display = rowsFor(dashboardDeptTab, dashboardTab);
  }
  _lastDashboardDisplay = display;

  var meta = DASHBOARD_DEPT_META[dashboardDeptTab] || DASHBOARD_DEPT_META.bac;
  function selectedDeptCount(tab) {
    if (dashboardDeptTab === 'all') {
      var _seen = {};
      var count = 0;
      allDepts.forEach(function(dept) {
        rowsFor(dept, tab).forEach(function(r) {
          var tn = String(r['TRACKING NO.'] || '').trim();
          if (!tn) { count++; return; }
          if (!_seen[tn]) { _seen[tn] = true; count++; }
        });
      });
      return count;
    }
    return rowsFor(dashboardDeptTab, tab).length;
  }
  var counts = {
    active:selectedDeptCount('active'),
    returned:selectedDeptCount('returned'),
    completed:selectedDeptCount('completed'),
    cancelled:selectedDeptCount('cancelled')
  };
  Object.keys(counts).forEach(function(t){
    var el = document.getElementById('dashboard-count-'+t); if (el) el.textContent = counts[t];
  });

  ['bac','supply','budget','accounting','rcao','arda','cash','enduser','all'].forEach(function(key){
    var el = document.getElementById('dashboard-dept-count-'+key);
    if (el) {
      if (key === 'all') {
        el.textContent = selectedDeptCount(dashboardTab);
      } else {
        el.textContent = rowsFor(key, dashboardTab).length;
      }
    }
  });

  var titleMap = { active:'In Progress', returned:'Returned', completed:'Completed', cancelled:'Cancelled' };
  var displayTabLabel = (dashboardDeptTab === 'enduser')
    ? (dashboardEnduserSubTab === 'done' ? 'Completed' : 'Not Taken')
    : (titleMap[dashboardTab] || 'In Progress');
  var titleEl = document.getElementById('dashboard-panel-title');
  if (titleEl) titleEl.textContent = displayTabLabel;
  if (sub) sub.textContent = display.length + ' transaction' + (display.length !== 1 ? 's' : '');

  if (thead) {
    if (dashboardDeptTab === 'all') {
      thead.innerHTML = dashboardRenderTab === 'returned' ? meta.returnedHeader : (dashboardRenderTab === 'active' ? meta.activeHeader : meta.otherHeader);
    } else if (dashboardDeptTab === 'enduser') {
      thead.innerHTML = dashboardRenderTab === 'returned' ? meta.returnedHeader : (dashboardRenderTab === 'active' ? meta.activeHeader : meta.otherHeader);
    } else {
      thead.innerHTML = dashboardRenderTab === 'returned' ? meta.returnedHeader : dashboardDeptHeader(dashboardDeptTab, dashboardRenderTab);
    }
  }
  if (titleEl) titleEl.textContent = displayTabLabel + ' · ' + meta.title;
  if (sub) sub.textContent = display.length + ' row' + (display.length !== 1 ? 's' : '');
  syncBacCategoryFilterVisibility();

  var colSpan = dashboardDeptTab === 'all' || dashboardDeptTab === 'enduser'
    ? (dashboardRenderTab === 'returned' ? meta.returnedCols : (dashboardRenderTab === 'active' ? meta.activeCols : meta.otherCols))
    : (dashboardRenderTab === 'returned' ? meta.returnedCols : dashboardDeptColSpan(dashboardDeptTab, dashboardRenderTab));
  if (!display.length) { tb.innerHTML='<tr><td colspan="'+colSpan+'">'+emptyRow(colSpan)+'</td></tr>'; return; }

  tb.innerHTML = display.map(function(r) {
    var deptForRow = dashboardDeptTab === 'all' ? (r._dashDept || 'bac') : dashboardDeptTab;
    var actionDept = r._dashSourceDept || deptForRow;
    var category = dashboardRowCategory(deptForRow, r);
    var status = String(r['STATUS']||'').trim().toUpperCase();
    var isReturnedTarget = category === 'returned';
    var isReturnLocked = category === 'locked';
    var isCompleted = category === 'completed' || category === 'cancelled';
    var isForwarded = status.indexOf('FORWARDED TO') === 0;
    var canModify = ['bac','supply','budget','accounting','rcao','arda','cash'].indexOf(actionDept) !== -1;
    var viewModeArg = dashboardDeptTab === 'all' ? ',\'all\'' : '';
    var actions = '<div class="action-menu"><button class="action-dots" onclick="toggleActionMenu(this,event)">⋯</button><div class="action-popup">'+
      '<button class="btn-sm view" onclick="openViewModal(\''+actionDept+'\','+r._rowNum+viewModeArg+')">View</button>';
    if (isReturnedTarget) {
      actions += '<button class="btn-sm success" onclick="completeReturnedDashboardItem(\''+actionDept+'\','+r._rowNum+')">Receive</button>';
    } else if (!isReturnLocked && canModify) {
      actions += '<button class="btn-sm edit" onclick="openEditModal(\''+actionDept+'\','+r._rowNum+')">✏ Update</button>';
      if (actionDept !== 'cash' && !isCompleted && !isForwarded) {
        actions += '<button class="btn-sm forward" onclick="openForwardModal(\''+SHEET_NAMES[actionDept]+'\','+r._rowNum+')">Forward</button>';
      }
      if (!isCompleted && !isForwarded) {
        actions += '<button class="btn-sm warn" onclick="openReturnModal(\''+SHEET_NAMES[actionDept]+'\','+r._rowNum+')">Return</button>';
      }
      if (actionDept === 'cash' && status !== 'PAID' && status !== 'COMPLETED' && status !== 'CANCELLED') {
        actions += '<button class="btn-sm paid" onclick="doMarkPaid('+r._rowNum+')">Mark Completed</button>';
      }
      if (!isCompleted && ['bac','supply','budget'].indexOf(actionDept) !== -1) {
        actions += '<button class="btn-sm cancel" onclick="doCancelTransaction(\''+SHEET_NAMES[actionDept]+'\','+r._rowNum+')">Cancel</button>';
      }
    }
    actions += '</div></div>';

    if (dashboardDeptTab === 'all') {
      var _allColsForTab = (dashboardRenderTab === 'completed' || dashboardRenderTab === 'cancelled') ? DASHBOARD_ALL_TX_COLUMNS_COMPLETED : DASHBOARD_ALL_TX_COLUMNS;
      var allCells = _allColsForTab.map(function(col){
        var rawVal = r[col] || '';
        if (col === 'CURRENT DEPT') return '<td>'+esc2(String(rawVal || deptForRow).toUpperCase() || '—')+'</td>';
        if (col === 'CURRENT STATUS') return '<td>'+statusBadge(rawVal || r['STATUS'] || '—')+'</td>';
        if (col === 'TRACKING NO.' || col === 'P.R NO.') return dashboardPrimaryIdCell(col, rawVal, deptForRow);
        if (DASHBOARD_ALL_TX_CURRENCY[col]) return '<td>'+currency(rawVal || '—')+'</td>';
        return '<td'+(col === 'PARTICULARS' ? ' class="td-wrap"' : '')+'>'+esc2(rawVal || '—')+'</td>';
      }).join('');
      return '<tr class="'+((isCompleted || dashboardIsReturnPending(r))?'completed-row':'')+'">'+allCells+'<td>'+actions+'</td></tr>';
    }

    if (dashboardRenderTab === 'returned') {
      if (deptForRow === 'enduser') {
        return '<tr class="completed-row">'+
          trackingPrCell(r, undefined, true)+
          '<td>'+esc2(r['REQUESTING OFFICE']||r['END-USER / REQUESTED BY']||r['END USER']||'—')+'</td>'+
          '<td>'+esc2(r['RETURNED FROM']||'—')+'</td>'+
          '<td>'+esc2(r['RETURN REMARKS']||'—')+'</td>'+
          '<td class="td-mono">'+esc2(r['RETURNED DATE']||'—')+'</td>'+
          '<td>'+actions+'</td>'+
          '</tr>';
      }
      var deptDisplay = dashboardDeptTab === 'all' ? ('<td>'+esc2(deptForRow.toUpperCase())+'</td>') : '';
      var noPrCell = dashboardDeptTab !== 'all' && dashboardDeptTab !== 'bac';
      return '<tr class="completed-row">'+
        trackingPrCell(r, undefined, noPrCell)+
        deptDisplay+
        '<td>'+esc2(r['RETURNED FROM']||'—')+'</td>'+
        (dashboardDeptTab === 'all' ? '<td>'+esc2(r['RETURNED DATE']||'—')+'</td>' : ('<td>'+esc2(r['RETURN REMARKS']||'—')+'</td><td class="td-mono">'+esc2(r['RETURNED DATE']||'—')+'</td>'))+
        '<td>'+actions+'</td>'+
        '</tr>';
    }

    if (deptForRow === 'enduser' && dashboardRenderTab === 'active') {
      return '<tr class="'+((isCompleted || dashboardIsReturnPending(r))?'completed-row':'')+'">'+
        trackingPrCell(r, undefined, true)+
        '<td>'+esc2(r['REQUESTING OFFICE']||r['END-USER / REQUESTED BY']||r['END USER']||'—')+'</td>'+
        '<td>'+esc2(r['DATE CREATED']||r['DATE RECEIVED']||'—')+'</td>'+
        '<td>'+statusBadge(r['STATUS'])+'</td>'+
        '<td>'+actions+'</td>'+
        '</tr>';
    }

    if (deptForRow === 'enduser') {
      if (dashboardRenderTab === 'completed') {
        return '<tr class="completed-row">'+
          trackingPrCell(r)+
          '<td>'+esc2(r['COMPLETED TO']||'—')+'</td>'+
          '<td class="td-mono">'+esc2(r['COMPLETED AT']||'—')+'</td>'+
          '<td>'+esc2(r['FORWARD REMARKS']||'—')+'</td>'+
          '<td>'+actions+'</td>'+
          '</tr>';
      }
      return '<tr class="'+((isCompleted || dashboardIsReturnPending(r))?'completed-row':'')+'">'+
        trackingPrCell(r, undefined, true)+
        '<td>'+esc2(r['REQUESTING OFFICE']||r['END-USER / REQUESTED BY']||r['END USER']||'—')+'</td>'+
        '<td>'+esc2(r['RETURNED FROM']||'—')+'</td>'+
        '<td>'+esc2(r['RETURN REMARKS']||'—')+'</td>'+
        '<td class="td-mono">'+esc2(r['RETURNED DATE']||'—')+'</td>'+
        '<td>'+esc2(r['RETURN RECEIVED REMARKS']||'—')+'</td>'+
        '<td class="td-mono">'+esc2(r['RETURN RECEIVED DATE']||r['COMPLETED AT']||'—')+'</td>'+
        '<td>'+statusBadge(r['STATUS'])+'</td>'+
        '<td>'+actions+'</td>'+
        '</tr>';
    }

    return dashboardDeptRow(deptForRow, r, dashboardRenderTab, actions);
  }).join('');
}

function filterDashboard(){
  var q  = (document.getElementById('dashboard-search').value||'').toLowerCase();
  var tb = document.getElementById('dashboard-tbody');
  if (!tb) return;
  tb.querySelectorAll('tr').forEach(function(r){ r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; });
}

function renderUsersTable(rows){
  var staffTb   = document.getElementById('staff-tbody');
  var euTb      = document.getElementById('endusers-users-tbody');
  if (!staffTb && !euTb) return;

  var staffRows = rows.filter(function(r){ return !r.isEndUser; });
  var euRows    = rows.filter(function(r){ return !!r.isEndUser; });

  var subStaff = document.getElementById('staff-panel-sub');
  var subEu    = document.getElementById('endusers-users-panel-sub');
  if (subStaff) subStaff.textContent = staffRows.length + ' user' + (staffRows.length!==1?'s':'');
  if (subEu)    subEu.textContent    = euRows.length    + ' user' + (euRows.length!==1?'s':'');

  function buildRows(list, colspan){
    if (!list.length) return '<tr><td colspan="'+colspan+'">'+emptyRow(colspan)+'</td></tr>';
    return list.map(function(r){
      var statusClass = r.isActive ? 'badge-op' : 'badge-grey';
      var statusText = r.isActive ? 'Active' : 'Inactive';
      return '<tr>'+
        '<td>'+esc2(r.firstName||'—')+'</td>'+
        '<td>'+esc2(r.lastName||'—')+'</td>'+
        '<td class="td-primary">'+esc2(r.username||'—')+'</td>'+
        '<td>'+roleBadge(r.role)+'</td>'+
        '<td><span class="badge '+statusClass+'">'+statusText+'</span></td>'+
        '<td><div class="action-menu"><button class="action-dots" onclick="toggleActionMenu(this,event)">⋯</button><div class="action-popup">'+
          '<button class="btn-sm edit" onclick="openEditUserModal('+r._rowNum+')">✏ Update</button>'+
          '<button class="btn-sm danger" onclick="doDeleteUser('+r._rowNum+',\''+esc(r.username)+'\')">🗑 Delete</button>'+
        '</div></div></td>'+
      '</tr>';
    }).join('');
  }

  if (staffTb) staffTb.innerHTML = buildRows(staffRows, 6);
  if (euTb)    euTb.innerHTML    = buildRows(euRows, 6);
}

function openEditUserModal(rowNum){
  var rows = cachedRows['users']||[];
  var row  = rows.find(function(r){ return r._rowNum === rowNum; });
  if (!row) { showToast('User data not found. Please refresh.','error'); return; }
  var tab = row.isEndUser ? 'enduser' : 'staff';
  userModalState = { mode:'edit', rowNum:rowNum, username:row.username, tab:tab };
  document.getElementById('user-modal-title').textContent = 'Update User';
  document.getElementById('user-modal-meta').textContent  = 'Editing: '+row.username;
  document.getElementById('user-modal-body').innerHTML    = buildAddUserTabs(tab, row);
  document.getElementById('user-modal-save').textContent  = 'Save Updates';
  document.getElementById('user-modal').classList.add('open');
}

function saveUserModal(){
  var btn      = document.getElementById('user-modal-save');
  var firstName = (document.getElementById('uf-first-name').value||'').trim();
  var lastName = (document.getElementById('uf-last-name').value||'').trim();
  var username = (document.getElementById('uf-username').value||'').trim();
  var password = (document.getElementById('uf-password').value||'').trim();
  var role     = (document.getElementById('uf-role').value||'').trim();
  var isActive = (document.getElementById('uf-active')||{}).checked;
  var isEndUser = userModalState.tab === 'enduser';

  if (!username) { showToast('Username is required.','error'); return; }
  if (!role)     { showToast('Role is required.','error'); return; }
  if (userModalState.mode === 'add' && !password) { showToast('Password is required for new users.','error'); return; }

  var userData = { firstName:firstName, lastName:lastName, username:username, role:role, isEndUser:isEndUser, isActive:isActive };
  if (password) userData.password = password;
  btn.disabled = true;

  if (userModalState.mode === 'add') {
    btn.textContent = 'Adding…';
    google.script.run
      .withSuccessHandler(function(res){
        btn.disabled=false; btn.textContent='Add User';
        document.getElementById('user-modal').classList.remove('open');
        if (res&&res.success) { showToast('✅ User added: '+username+' ('+res.userId+')','success'); loadData(); }
        else showToast('Error: '+(res&&res.message||'Unknown'),'error');
        userModalState={};
      })
      .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Add User'; showToast('Error: '+e.message,'error'); })
      .addUser(userData, currentUser.username);
  } else {
    btn.textContent = 'Saving…';
    google.script.run
      .withSuccessHandler(function(res){
        btn.disabled=false; btn.textContent='Save Updates';
        document.getElementById('user-modal').classList.remove('open');
        if (res&&res.success) { showToast('User updated.','success'); loadData(); }
        else showToast('Error: '+(res&&res.message||'Unknown'),'error');
        userModalState={};
      })
      .withFailureHandler(function(e){ btn.disabled=false; btn.textContent='Save Updates'; showToast('Error: '+e.message,'error'); })
      .updateUser(userModalState.rowNum, userData, currentUser.username);
  }
}

function doDeleteUser(rowNum, username){
  showConfirm({
    type:'danger', icon:'🗑', title:'Delete User',
    message:'Delete user "'+username+'"? This cannot be undone.',
    ok:'Delete'
  }, function(){
    google.script.run
      .withSuccessHandler(function(res){
        if (res&&res.success) { showToast('User "'+username+'" deleted.','info'); loadData(); }
        else showToast('Error: '+(res&&res.message||'Unknown'),'error');
      })
      .withFailureHandler(function(e){ showToast('Error: '+e.message,'error'); })
      .deleteUser(rowNum, username, currentUser.username);
  });
}

function closeUserModal(e){
  if(e&&e.target!==document.getElementById('user-modal')) return;
  document.getElementById('user-modal').classList.remove('open'); userModalState={};
}

function _dashboardGetExportSpec() {
  var rows = _lastDashboardDisplay;
  var deptLabels = {bac:'BAC',supply:'Supply & Property',budget:'Budget',accounting:'Accounting',cash:'Cashier',rcao:'RCAO',arda:'ARDA',enduser:'Requesting Office',all:'All Departments'};
  var tabLabels  = {active:'In Progress',returned:'Returned',completed:'Completed',cancelled:'Cancelled'};
  var deptLabel  = deptLabels[dashboardDeptTab] || dashboardDeptTab;
  var tabLabel   = (dashboardDeptTab === 'enduser') ? (dashboardEnduserSubTab === 'done' ? 'Completed' : 'Not Taken') : (tabLabels[dashboardTab] || 'In Progress');
  var title = deptLabel + ' — ' + tabLabel;
  var renderTab = (dashboardDeptTab === 'enduser') ? (dashboardEnduserSubTab === 'done' ? 'completed' : 'returned') : dashboardTab;

  function cur(row, key) {
    var n = parseFloat(String(row[key]||row['AMOUNT']||'').replace(/[^0-9.-]/g,''));
    return isNaN(n) ? '—' : '₱'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  }
  var headers, getCells;

  if (dashboardDeptTab === 'enduser') {
    if (renderTab === 'completed') {
      headers = ['Tracking No.','P.R No.','Forwarded To','Completed At','Remarks'];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R #']||r['P.R NO.']||'—',r['COMPLETED TO']||'—',r['COMPLETED AT']||'—',r['FORWARD REMARKS']||'—']; };
    } else {
      headers = ['Tracking No.','Requesting Office','Returned From','Return Remarks','Returned Date','Status'];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['REQUESTING OFFICE']||r['END-USER / REQUESTED BY']||r['END USER']||'—',r['RETURNED FROM']||'—',r['RETURN REMARKS']||'—',r['RETURNED DATE']||'—',r['STATUS']||'—']; };
    }
  } else if (renderTab === 'returned') {
    if (dashboardDeptTab === 'all') {
      headers = ['Tracking No.','P.R No.','Dept','Returned From','Returned Date'];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||r['P.R #']||'—',(r._dashDept||'').toUpperCase(),r['RETURNED FROM']||'—',r['RETURNED DATE']||'—']; };
    } else {
      var noPr = ['supply','budget','accounting','cash','rcao','arda'].indexOf(dashboardDeptTab) !== -1;
      headers = ['Tracking No.'].concat(noPr?[]:['P.R No.']).concat(['Returned From','Return Remarks','Returned Date']);
      getCells = function(r){ var b=[r['TRACKING NO.']||'—']; if(!noPr) b.push(r['P.R NO.']||r['P.R #']||'—'); return b.concat([r['RETURNED FROM']||'—',r['RETURN REMARKS']||'—',r['RETURNED DATE']||'—']); };
    }
  } else if (dashboardDeptTab === 'all') {
    var allCols = (renderTab==='completed'||renderTab==='cancelled') ? DASHBOARD_ALL_TX_COLUMNS_COMPLETED : DASHBOARD_ALL_TX_COLUMNS;
    headers = allCols.map(dashboardDeptColumnLabel);
    getCells = function(r){ return allCols.map(function(c){ return c==='CURRENT STATUS'?(r['STATUS']||'—'):DASHBOARD_ALL_TX_CURRENCY[c]?cur(r,c):(r[c]||'—'); }); };
  } else {
    var layout = DASHBOARD_DEPT_FIELD_LAYOUT[dashboardDeptTab] || DASHBOARD_DEPT_FIELD_LAYOUT.bac;
    var fields = renderTab==='active' ? layout.active : layout.other;
    if (renderTab==='cancelled') fields = fields.map(function(f){ return f==='COMPLETED AT'?'CANCELLED AT':f; });
    var isBAC = dashboardDeptTab === 'bac';
    headers = ['Tracking No.'].concat(isBAC?['P.R No.']:[]).concat(fields.map(dashboardDeptColumnLabel));
    getCells = function(r){ var b=[r['TRACKING NO.']||'—']; if(isBAC) b.push(r['P.R NO.']||r['P.R #']||'—'); return b.concat(fields.map(function(f){ return (DASHBOARD_ALL_TX_CURRENCY[f]||f==='P.O. AMOUNT'||f==='ORS AMOUNT'||f==='NET AMOUNT'||f==='TAX AMOUNT')?cur(r,f):(r[f]||'—'); })); };
  }
  return {title:title, headers:headers, rows:rows, getCells:getCells};
}

function printDashboardTable() {
  var spec = _dashboardGetExportSpec();

  _openPrintDoc(spec.title, _buildPrintTable(spec.headers, spec.rows, spec.getCells), {
    colCount: spec.headers.length,
    meta: [spec.rows.length+' record'+(spec.rows.length!==1?'s':'')]
  });
}

function csvExportDashboardTable() {
  var spec = _dashboardGetExportSpec();

}

function _getDeptExportSpec(page) {
  var rows = (cachedRows[page] || []).filter(function(r){
    return (typeof rowMatchesActiveBacCategory === 'function') ? rowMatchesActiveBacCategory(r) : true;
  });

  var tab = (typeof tabState !== 'undefined' && tabState[page]) || 'active';
  var newSub = (typeof newSubTabState !== 'undefined' && newSubTabState[page]) ? newSubTabState[page] : 'incoming';
  var renderTab = tab;
  if (tab === 'new' && newSub === 'returns') renderTab = 'returned';

  function isNotifiedRow(r){ return String(r['IS NOTIFIED']||r['IS NEW']||'').trim().toUpperCase()==='TRUE'; }
  function isReturnBackRow(r){ return String(r['IS RETURN BACK']||'').trim().toUpperCase()==='TRUE'; }
  function isReturnPending(r){
    if (String(r['STATUS']||'').trim().toUpperCase()==='PROCESSING') return false;
    return String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()==='';
  }
  function isReturnResolved(r){
    return String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()!=='';
  }

  var displayRows;
  if (renderTab === 'new') {
    displayRows = rows.filter(function(r){
      return isNotifiedRow(r) && !isReturnBackRow(r) && !isReturnPending(r) &&
             String(r['STATUS']||'').trim().toUpperCase()!=='CANCELLED' &&
             (!r['COMPLETED AT']||String(r['COMPLETED AT']).trim()==='');
    });
  } else if (renderTab === 'returned') {
    if (tab === 'new') {
      displayRows = rows.filter(function(r){ return isReturnBackRow(r) || isReturnPending(r); });
    } else {
      var rtLabel = {bac:'BAC',supply:'Supply',budget:'Budget',accounting:'Accounting',cash:'Cashier'}[page]||'';
      displayRows = rows.filter(function(r){
        if (!isReturnPending(r)) return false;
        return String(r['RETURNED FROM']||'').trim() === rtLabel;
      });
    }
  } else if (renderTab === 'returndone') {
    var rtLabelD = {bac:'BAC',supply:'Supply',budget:'Budget',accounting:'Accounting',cash:'Cashier'}[page]||'';
    displayRows = rows.filter(function(r){
      if (!isReturnResolved(r)) return false;
      return String(r['RETURNED FROM']||'').trim() === rtLabelD;
    });
  } else if (renderTab === 'done') {
    displayRows = rows.filter(function(r){
      return r['COMPLETED AT'] && String(r['COMPLETED AT']).trim()!=='' &&
             String(r['STATUS']||'').trim().toUpperCase()!=='CANCELLED' && !isReturnPending(r);
    });
  } else if (renderTab === 'cancelled') {
    displayRows = rows.filter(function(r){
      return String(r['STATUS']||'').trim().toUpperCase()==='CANCELLED' && !isReturnPending(r);
    });
  } else {
    displayRows = rows.filter(function(r){
      var s = String(r['STATUS']||'').trim().toUpperCase();
      return (!r['COMPLETED AT']||String(r['COMPLETED AT']).trim()==='') && s!=='CANCELLED' &&
             !isNotifiedRow(r) && !isReturnPending(r) && !isReturnResolved(r);
    });
  }

  var searchIds = {bac:'bac-search',supply:'supply-search',budget:'budget-search',accounting:'acctg-search',cash:'cash-search',rcao:'rcao-search',arda:'arda-search'};
  var qEl = document.getElementById(searchIds[page]||(page+'-search'));
  var q = (qEl ? qEl.value : '').toLowerCase();
  if (q) {
    displayRows = displayRows.filter(function(r){
      return Object.keys(r).some(function(k){ return String(r[k]||'').toLowerCase().indexOf(q)!==-1; });
    });
  }

  var DEPT_TITLES = {bac:'BAC',supply:'Supply',budget:'Budget',accounting:'Accounting',cash:'Cashier',rcao:'RCAO',arda:'ARDA'};
  var TAB_LABELS  = {active:'Active',done:'Completed',cancelled:'Cancelled',returned:'Returned',returndone:'Return Done',new:'New'};
  var title = (DEPT_TITLES[page]||page) + ' — ' + (TAB_LABELS[renderTab]||'Active') + ' Transactions';

  var isReturned = renderTab==='returned' || renderTab==='returndone';
  var isDone = renderTab==='done';
  var isRcaoArda = page==='rcao' || page==='arda';

  var headers, getCells;

  if (isReturned) {
    var isResolved = renderTab==='returndone';
    if (isRcaoArda) {
      headers = isResolved
        ? ['Tracking No.','Returned By','Remarks','Returned Date & Time','Return To Remarks','Return Received Date']
        : ['Tracking No.','Returned By','Remarks','Returned Date & Time'];
      getCells = isResolved
        ? function(r){ return [r['TRACKING NO.']||'—',returnedFromDisplayValue(r),returnedRemarksDisplayValue(r),r['RETURNED DATE']||'—',r['RETURN RECEIVED REMARKS']||'—',r['RETURN RECEIVED DATE']||'—']; }
        : function(r){ return [r['TRACKING NO.']||'—',returnedFromDisplayValue(r),returnedRemarksDisplayValue(r),r['RETURNED DATE']||'—']; };
    } else {
      headers = isResolved
        ? ['Tracking No.','P.R No.','Returned By','Remarks','Returned Date & Time','Return To Remarks','Return Received Date']
        : ['Tracking No.','P.R No.','Returned By','Remarks','Returned Date & Time'];
      getCells = isResolved
        ? function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',returnedFromDisplayValue(r),returnedRemarksDisplayValue(r),r['RETURNED DATE']||'—',r['RETURN RECEIVED REMARKS']||'—',r['RETURN RECEIVED DATE']||'—']; }
        : function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',returnedFromDisplayValue(r),returnedRemarksDisplayValue(r),r['RETURNED DATE']||'—']; };
    }
  } else {
    var lastCol = isDone ? 'Completed At' : 'Status';
    if (page==='bac') {
      headers = ['Tracking No.','P.R No.','Date Received','End User','Category','PHIGEPS Posted','Approved ABC','RFQ','Complete RFQ Returned','RFQ Date of Completion','Abstract of Award','Awarded To','Date of Award','Mode of Procurement','BAC Reso','BAC Reso Status','NOA','NTP',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['END-USER / REQUESTED BY']||r['END USER']||'—',r['CATEGORY']||'—',r['PHIGEPS POSTED']||'—',r['APPROVED ABC']||'—',r['RFQ']||'—',r['COMPLETE RFQ RETURNED']||'—',r['RFQ DATE OF COMPLETION']||'—',r['ABSTRACT OF AWARD']||'—',r['AWARDED TO']||'—',r['DATE OF AWARD']||'—',r['MODE OF PROCUREMENT']||'—',r['BAC RESO']||'—',r['BAC RESO STATUS']||'—',r['NOA']||'—',r['NTP']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    } else if (page==='supply') {
      headers = ['Tracking No.','P.R No.','Date Received','End User','P.O. No.','P.O. Date','Doc Type','Supplier','Particulars','P.O. Amount','Date Transmitted to Supplier','Date Received by Supplier','COA Date Received','I.A.R No.','Invoice No.','Date Returned to Supply',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['END-USER / REQUESTED BY']||r['END USER']||'—',r['P.O. NO.']||'—',r['P.O. DATE']||'—',r['DOCUMENT TYPE']||'—',r['SUPPLIER']||'—',r['PARTICULARS']||'—',r['P.O. AMOUNT']||'—',r['DATE TRANSMITTED TO SUPPLIER']||'—',r['DATE RECEIVED BY SUPPLIER']||'—',r['COA DATE RECEIVED']||'—',r['I.A.R  NO.']||r['I.A.R NO.']||'—',r['INVOICE  NO.']||r['INVOICE NO.']||'—',r['DATE RETURNED TO SUPPLY']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    } else if (page==='budget') {
      headers = ['Tracking No.','P.R No.','Date Received','ORS No.','BUPR No.','ORS Amount',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['ORS NO.']||'—',r['BUPR NO.']||'—',r['ORS AMOUNT']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    } else if (page==='accounting') {
      headers = ['Tracking No.','P.R No.','Date Received','DV No.','Net Amount','TAX Amount',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['DV NO.']||'—',r['NET AMOUNT']||'—',r['TAX AMOUNT']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    } else if (page==='cash') {
      headers = ['Tracking No.','P.R No.','Date Received','Cheque No. / LDDAP','Date of Cheque',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['CHEQUE NO. / LDDAP']||'—',r['DATE OF CHEQUE']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    } else {
      headers = ['Tracking No.','Date Received',lastCol];
      getCells = function(r){ return [r['TRACKING NO.']||'—',r['DATE RECEIVED']||'—',(isDone?r['COMPLETED AT']:r['STATUS'])||'—']; };
    }
  }

  return { title:title, headers:headers, rows:displayRows, getCells:getCells };
}

function printDeptTable(page) {
  var spec = _getDeptExportSpec(page);
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  _openPrintDoc(spec.title, _buildPrintTable(spec.headers, spec.rows, spec.getCells), {
    colCount: spec.headers.length,
    meta: [spec.rows.length+' record'+(spec.rows.length!==1?'s':'')]
  });
}

function csvExportDeptTable(page) {
  var spec = _getDeptExportSpec(page);
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  var safeTitle = spec.title.replace(/[^A-Za-z0-9 ]/g,'').replace(/\s+/g,'-');
  csvDownload('DAR-RO5-'+safeTitle+'.csv', spec.headers, spec.rows, spec.getCells);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MYREQS PAGE EXPORT
// ═══════════════════════════════════════════════════════════════════════════════
function _getMyReqsExportSpec() {
  var euRows = (cachedMyReqDeptRows['enduser'] || []).filter(function(r){
    return (typeof rowMatchesActiveBacCategory === 'function') ? rowMatchesActiveBacCategory(r) : true;
  });

  var trackingSet = {};
  (cachedMyReqs || []).forEach(function(r){ if (r.trackingNo) trackingSet[r.trackingNo] = true; });
  euRows = euRows.filter(function(r){
    r._myReqDept = 'enduser';
    return r['TRACKING NO.'] && trackingSet[r['TRACKING NO.']];
  });

  var TAB_LABELS = { active:'Processing', returned:'Returned', done:'Completed', cancelled:'Cancelled' };
  var tab = myReqsTab || 'active';
  var title = 'My Requests — ' + (TAB_LABELS[tab]||'Active');

  var displayRows = euRows.filter(function(r){
    return (typeof classifyMyReqDeptRow === 'function') ? classifyMyReqDeptRow(r) === tab : true;
  });

  var qEl = document.getElementById('myreqs-search');
  var q = (qEl ? qEl.value : '').toLowerCase();
  if (q) {
    displayRows = displayRows.filter(function(r){
      return Object.keys(r).some(function(k){ return String(r[k]||'').toLowerCase().indexOf(q)!==-1; });
    });
  }

  var headers, getCells;
  if (tab === 'returned') {
    headers = ['Tracking No.','P.R No.','Returned By','Remarks','Date & Time'];
    getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',returnedFromDisplayValue(r),returnedRemarksDisplayValue(r),r['RETURNED DATE']||'—']; };
  } else if (tab === 'done') {
    headers = ['Tracking No.','P.R No.','Date Received','Completed At'];
    getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',r['COMPLETED AT']||'—']; };
  } else {
    headers = ['Tracking No.','P.R No.','Date Received','Forwarded From','Remarks','Status'];
    getCells = function(r){ return [r['TRACKING NO.']||'—',r['P.R NO.']||'—',r['DATE RECEIVED']||'—',String(r['FORWARDED FROM']||'—'),String(r['REMARKS']||r['FORWARD REMARKS']||'—'),r['STATUS']||'—']; };
  }

  return { title:title, headers:headers, rows:displayRows, getCells:getCells };
}

function printMyReqsTable() {
  var spec = _getMyReqsExportSpec();
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  _openPrintDoc(spec.title, _buildPrintTable(spec.headers, spec.rows, spec.getCells), {
    meta: [spec.rows.length+' record'+(spec.rows.length!==1?'s':'')]
  });
}

function csvExportMyReqsTable() {
  var spec = _getMyReqsExportSpec();
  if (!spec.rows.length) { showToast('No data to export.','info'); return; }
  var safeTitle = spec.title.replace(/[^A-Za-z0-9 ]/g,'').replace(/\s+/g,'-');
  csvDownload('DAR-RO5-'+safeTitle+'.csv', spec.headers, spec.rows, spec.getCells);
}
