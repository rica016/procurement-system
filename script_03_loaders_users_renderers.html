<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  RENDER AUDIT TABLE
// ═══════════════════════════════════════════════════════════════════════════════
var _auditRows = [];

function renderAuditTable(rows){
  _auditRows = rows || [];
  _applyAuditFilter();
}

function _auditRowHTML(r){
  var a = String(r.action||'').toUpperCase();
  var acls = a.includes('CREATE')?'audit-action-create':a.includes('DELETE')?'audit-action-delete':a.includes('LOGIN')?'audit-action-login':'audit-action-update';
  var displayName = r.fullName || r.username || '—';
  var userCell = '<td style="font-weight:700;">'+esc2(displayName)+
    '<div style="font-size:10.5px;font-weight:400;color:var(--muted2);font-family:\'DM Mono\',monospace;margin-top:2px;">'+esc2(r.username)+'</div></td>';
  return '<tr class="audit-row">'+
    '<td class="td-mono" style="white-space:nowrap;">'+esc2(r.timestamp)+'</td>'+
    userCell+
    '<td class="'+acls+'">'+esc2(r.action)+'</td>'+
    '<td>'+esc2(r.department)+'</td>'+
    '<td class="td-mono">'+esc2(r.recordId)+'</td>'+
  '</tr>';
}

function _applyAuditFilter(){
  var tb  = document.getElementById('audit-tbody');
  var sub = document.getElementById('audit-panel-sub');
  var clearBtn = document.getElementById('audit-date-clear');
  if (!tb) return;

  var q    = (document.getElementById('audit-search').value||'').toLowerCase();
  var from = document.getElementById('audit-date-from').value; // "YYYY-MM-DD" or ""
  var to   = document.getElementById('audit-date-to').value;

  // Show/hide the Clear button
  if (clearBtn) clearBtn.style.display = (from||to) ? '' : 'none';

  var filtered = _auditRows.filter(function(r){
    // Text search
    if (q) {
      var hay = [r.timestamp,r.username,r.action,r.department,r.recordId].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    // Date range — timestamp field is expected as "YYYY-MM-DD HH:MM:SS" or similar
    if (from || to) {
      // Extract just the date part (first 10 chars) regardless of separator
      var ts = String(r.timestamp||'').trim();
      // Handle common formats: "2025-04-07 14:30" or "04/07/2025 14:30"
      var datePart = ts.slice(0,10); // works for YYYY-MM-DD…
      // Fallback: try parsing as Date if slice doesn't look like a date
      if (!/^\d{4}-\d{2}-\d{2}/.test(datePart)) {
        var d = new Date(ts);
        if (!isNaN(d)) {
          datePart = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        }
      }
      if (from && datePart < from) return false;
      if (to   && datePart > to)   return false;
    }
    return true;
  });

  if (sub) sub.textContent = filtered.length + ' record' + (filtered.length!==1?'s':'') + ' · Most recent first' + (filtered.length < _auditRows.length ? ' (filtered)' : '');
  if (!filtered.length){ tb.innerHTML='<tr><td colspan="5">'+emptyRow(5)+'</td></tr>'; return; }
  tb.innerHTML = filtered.map(_auditRowHTML).join('');
}

function filterAuditTable(){ _applyAuditFilter(); }

function printAndClearAuditLogs(){
  // Collect the currently filtered (visible) rows
  var q    = (document.getElementById('audit-search').value||'').toLowerCase();
  var from = (document.getElementById('audit-date-from').value||'');
  var to   = (document.getElementById('audit-date-to').value||'');

  var filtered = _auditRows.filter(function(r){
    if (q) {
      var hay = [r.timestamp,r.username,r.action,r.department,r.recordId].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (from || to) {
      var ts = String(r.timestamp||'').trim();
      var datePart = ts.slice(0,10);
      if (!/^\d{4}-\d{2}-\d{2}/.test(datePart)) {
        var d = new Date(ts); if (!isNaN(d))
          datePart = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      if (from && datePart < from) return false;
      if (to   && datePart > to)   return false;
    }
    return true;
  });

  if (!filtered.length) { showToast('No records to export.','info'); return; }

  var filterDesc = [];
  if (q)    filterDesc.push('keyword "'+q+'"');
  if (from) filterDesc.push('from '+from);
  if (to)   filterDesc.push('to '+to);
  var filterNote = filterDesc.length ? 'Filtered by: '+filterDesc.join(', ')+'. ' : '';
  var confirmMsg = filterNote + filtered.length+' audit record'+(filtered.length!==1?'s':'')+' will be exported as PDF and permanently deleted. This cannot be undone.';

  showConfirm({
    type:'danger', icon:'🗑', title:'Export & Clear Audit Logs',
    message: confirmMsg,
    ok:'Export & Delete'
  }, function(){

  // Build print window
  var w = window.open('', '_blank');
  if (!w) { showToast('Please allow pop-ups to print.','error'); return; }

  var tableRows = filtered.map(function(r){
    var a = String(r.action||'').toUpperCase();
    var color = a.includes('CREATE')?'#15803d':a.includes('DELETE')?'#b91c1c':a.includes('LOGIN')?'#1d4ed8':'#92400e';
    var mainUser = esc2(r.fullName||r.username||'—');
    var subUser = (r.username&&r.fullName) ? '<span style="font-size:9.5px;color:#9ca3af;font-weight:500;"> ('+esc2(r.username)+')</span>' : '';
    return '<tr>'+
      '<td style="white-space:nowrap;color:#6b7280;">'+esc2(r.timestamp||'—')+'</td>'+
      '<td><strong>'+mainUser+'</strong>'+subUser+'</td>'+
      '<td style="font-weight:700;color:'+color+';">'+esc2(r.action||'—')+'</td>'+
      '<td>'+esc2(r.department||'—')+'</td>'+
      '<td style="font-family:monospace;font-size:10.5px;">'+esc2(r.recordId||'—')+'</td>'+
    '</tr>';
  }).join('');

  var now = new Date();
  var exportedAt = formatPHTime(now);
  var exportedBy = (currentUser&&(currentUser.fullName||currentUser.username))||'Admin';

  var html = '<!doctype html><html><head><meta charset="utf-8"><title>Audit Log Export — '+exportedAt+'</title>'+
    '<style>@page{margin:0;}*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Segoe UI,Arial,sans-serif;font-size:11.5px;color:#111827;padding:28px 32px;}'+
    'h1{font-size:17px;font-weight:800;margin-bottom:4px;}'+
    '.meta{font-size:11px;color:#6b7280;margin-bottom:20px;border-bottom:1px solid #e5e7eb;padding-bottom:12px;}'+
    '.warn{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;font-size:11px;color:#b91c1c;font-weight:600;margin-bottom:16px;}'+
    'table{width:100%;border-collapse:collapse;}th,td{border:1px solid #e5e7eb;padding:4px 6px;text-align:left;vertical-align:top;line-height:1.2;}'+
    'th{background:#f8fafc;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}'+
    'tr:nth-child(even) td{background:#fafafa;}'+
    '.footer{margin-top:18px;font-size:10px;color:#9ca3af;text-align:right;}'+
    '@media print{.warn{display:none;}}</style></head><body>'+
    '<h1>Audit Log Export</h1>'+
    '<div class="meta">Exported by <strong>'+esc2(exportedBy)+'</strong> on <strong>'+exportedAt+'</strong> &nbsp;·&nbsp; '+filtered.length+' record'+(filtered.length!==1?'s':'')+
      (filterDesc.length?' &nbsp;·&nbsp; Filtered by: '+filterDesc.map(esc2).join(', '):'')+'</div>'+
    '<div class="warn">⚠ These records have been permanently deleted from the system after this export.</div>'+
    '<table><thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Department</th><th>Record / Detail</th></tr></thead>'+
    '<tbody>'+tableRows+'</tbody></table>'+
    '<div class="footer">DAR RO V — Procurement Monitoring System &nbsp;·&nbsp; Audit Log &nbsp;·&nbsp; '+exportedAt+'</div>'+
    '</body></html>';

  w.document.open();
  w.document.write(html);
  w.document.close();
  var rowNums = filtered.map(function(r){ return r.rowNum || r._rowNum; }).filter(function(n){ return !!n; });
  var timestamps = filtered.map(function(r){ return r.timestamp||''; });

  function runDeleteAfterExport() {
    google.script.run
      .withSuccessHandler(function(res){
        if (res && res.success) {
          showToast('Deleted '+filtered.length+' audit record'+(filtered.length!==1?'s':'')+'.','success');
          loadData();
        } else {
          showToast('Deletion failed: '+(res&&res.message||'Unknown error')+'.','error');
          loadData();
        }
      })
      .withFailureHandler(function(e){
        showToast('Server error during deletion: '+e.message+'.','error');
        loadData();
      })
      .deleteAuditLogs(rowNums.length ? rowNums : timestamps);
  }

  w.addEventListener('afterprint', function(){
    try { w.close(); } catch (e) {}
    showConfirm({
      type:'danger',
      icon:'🗑',
      title:'Delete Exported Audit Records?',
      message:'If you printed successfully, click Delete Now. If you canceled printing, click Cancel to keep the logs.',
      ok:'Delete Now'
    }, runDeleteAfterExport);
  });
  w.focus();
  w.print();

  }); // end showConfirm callback
}

function clearAuditDateFilter(){
  var f = document.getElementById('audit-date-from');
  var t = document.getElementById('audit-date-to');
  if (f) f.value = '';
  if (t) t.value = '';
  _applyAuditFilter();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  RENDER PAGE DATA (dept pages)
// ═══════════════════════════════════════════════════════════════════════════════
var PAGE_COLS={bac:20, supply:17, budget:8, accounting:8, cash:7, rcao:4, arda:4};
var PAGE_COLS_ACTIVE={bac:20, supply:17, budget:8, accounting:8, cash:7, rcao:4, arda:4};
var PAGE_COLS_DONE={bac:20, supply:17, budget:8, accounting:8, cash:7, rcao:4, arda:4};
var PAGE_COLS_RETURNED={bac:6, supply:6, budget:6, accounting:6, cash:6, rcao:5, arda:5};
var PAGE_COLS_NEW={bac:11, supply:6, budget:8, accounting:8, cash:6, rcao:8, arda:8};

function renderPageData(page, rows){
  rows = (rows || []).filter(function(r){
    return (typeof rowMatchesActiveBacCategory === 'function') ? rowMatchesActiveBacCategory(r) : true;
  });
  var tab = tabState[page]||'active';
  var newSub = (typeof newSubTabState !== 'undefined' && newSubTabState[page]) ? newSubTabState[page] : 'incoming';
  var returnTargetLabel = {bac:'BAC',supply:'Supply',budget:'Budget',accounting:'Accounting',cash:'Cashier'}[page] || '';

  function isNotifiedRow(r) {
    return String(r['IS NOTIFIED'] || r['IS NEW'] || '').trim().toUpperCase() === 'TRUE';
  }
  function isReturnBackRow(r) {
    return String(r['IS RETURN BACK'] || '').trim().toUpperCase() === 'TRUE';
  }

  function isReturnPending(r){
    var status = String(r['STATUS']||'').trim().toUpperCase();
    if (status === 'PROCESSING') return false;
    return String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()==='';
  }
  function isReturnResolved(r){
    return String(r['RETURNED DATE']||'').trim()!=='' && String(r['RETURN RECEIVED DATE']||'').trim()!=='';
  }

  var newRows = rows.filter(function(r){
    return isNotifiedRow(r) &&
           !isReturnBackRow(r) &&
           !isReturnPending(r) &&
           String(r['STATUS']||'').trim().toUpperCase()!=='CANCELLED' &&
           (!r['COMPLETED AT']||r['COMPLETED AT'].trim()==='');
  });
  var returnRows = rows.filter(function(r){
    // Forwarded back to this dept after it previously processed the transaction
    if (isReturnBackRow(r)) return true;
    // Any pending return where CURRENT DEPT = this dept is a return TO this dept
    // (RETURN TO field is not populated, so we match all isPendingReturn rows)
    return isReturnPending(r);
  });
  var returnHistoryRows = rows.filter(function(r){
    if (!isReturnPending(r)) return false;
    var rf = String(r['RETURNED FROM']||'').trim();
    return rf === returnTargetLabel;
  });
  var returnDoneRows = rows.filter(function(r){
    if (!isReturnResolved(r)) return false;
    var rf = String(r['RETURNED FROM']||'').trim();
    return rf === returnTargetLabel;
  });
  var activeRows = rows.filter(function(r){
    var s   = String(r['STATUS']||'').trim().toUpperCase();
    var isN = isNotifiedRow(r);
    return (!r['COMPLETED AT']||r['COMPLETED AT'].trim()==='') && s!=='CANCELLED' && !isN && !isReturnPending(r) && !isReturnResolved(r);
  });
  var doneRows = rows.filter(function(r){
    return r['COMPLETED AT']&&r['COMPLETED AT'].trim()!=='' &&
           String(r['STATUS']||'').trim().toUpperCase()!=='CANCELLED' && !isReturnPending(r);
  });
  var cancelledRows = rows.filter(function(r){ return String(r['STATUS']||'').trim().toUpperCase()==='CANCELLED' && !isReturnPending(r); });

  var renderTab = tab;
  if (tab === 'new' && newSub === 'returns') renderTab = 'returned';

  var displayRows = renderTab==='new'?newRows:(renderTab==='returned'?(tab==='new'?returnRows:returnHistoryRows):(renderTab==='returndone'?returnDoneRows:(renderTab==='done'?doneRows:(renderTab==='cancelled'?cancelledRows:activeRows))));
  var showActions = renderTab==='new'||renderTab==='active'||renderTab==='returned'||renderTab==='returndone'||renderTab==='done'||renderTab==='cancelled';
  var cols = (renderTab==='new'&&PAGE_COLS_NEW[page]) || (renderTab==='returned'&&PAGE_COLS_RETURNED[page]) || (renderTab==='returndone'&&9) || (renderTab==='active'&&PAGE_COLS_ACTIVE[page]) || (renderTab==='done'&&PAGE_COLS_DONE[page]) || (renderTab==='cancelled'&&PAGE_COLS[page]) || PAGE_COLS[page] || 9;

  var cm={new:newRows.length+returnRows.length,active:activeRows.length,returned:returnHistoryRows.length,returndone:returnDoneRows.length,done:doneRows.length,cancelled:cancelledRows.length};
  Object.keys(cm).forEach(function(t){
    var el=document.getElementById(page+'-'+t+'-count'); if(el) el.textContent=cm[t];
  });
  var newIncomingEl=document.getElementById(page+'-new-incoming-count');
  if(newIncomingEl) newIncomingEl.textContent=newRows.length;
  var newReturnsEl=document.getElementById(page+'-new-returns-count');
  if(newReturnsEl) newReturnsEl.textContent=returnRows.length;

  ['new','active','returned','returndone','done','cancelled'].forEach(function(t){
    var el=document.getElementById('tab-'+page+'-'+t);
    if(el) el.classList.toggle('active', t===tab);
  });
  var newSubWrap=document.getElementById(page+'-new-subtabs');
  if(newSubWrap) newSubWrap.style.display = (tab==='new') ? '' : 'none';
  var newIncomingTab=document.getElementById('tab-'+page+'-new-sub-incoming');
  if(newIncomingTab) newIncomingTab.classList.toggle('active', newSub==='incoming');
  var newReturnsTab=document.getElementById('tab-'+page+'-new-sub-returns');
  if(newReturnsTab) newReturnsTab.classList.toggle('active', newSub==='returns');

  var titleMap={new:(newSub==='returns'?'↩ Return':'🔔 New'),active:'Active',returned:'Returned History',returndone:'Return Done',done:'Completed',cancelled:'Cancelled'};
  var panelEl=document.querySelector('#'+page+'-table-panel .panel-title');
  if(panelEl) panelEl.textContent=(titleMap[tab]||'Active')+' Transactions';

  var subKey = page==='accounting'?'acctg-panel-sub':page+'-panel-sub';
  var subEl=document.getElementById(subKey);
  if(subEl) subEl.textContent=displayRows.length+' record'+(displayRows.length!==1?'s':'');

  var theadLastSel='#'+(page==='accounting'?'accounting':page)+'-thead th:last-child';
  var thAct=document.querySelector(theadLastSel);
  if(thAct) thAct.style.display=showActions?'':'none';
  var completedSel='#'+(page==='accounting'?'accounting':page)+'-thead .th-completed-at';
  var thCompleted=document.querySelector(completedSel);
  if(thCompleted) thCompleted.style.display=(renderTab==='active')?'none':'';

  var tbId = page==='accounting'?'acctg-tbody':page+'-tbody';
  var tb=document.getElementById(tbId); if(!tb) return;
  if(!displayRows.length){ tb.innerHTML=emptyRow(showActions?cols:cols-1); return; }
  tb.innerHTML=displayRows.map(function(r){ return ROW_BUILDERS[page](r,renderTab); }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ROW BUILDERS
// ═══════════════════════════════════════════════════════════════════════════════
var SHEET_NAMES={bac:'BAC',supply:'SUPPLY AND PROPERTY',budget:'BUDGET',accounting:'ACCOUNTING',cash:'CASH',rcao:'RCAO',arda:'ARDA',enduser:'END USER'};

function isAdmin(){ return currentUser&&currentUser.role==='ADMIN'; }
function canEdit(dept){
  return currentUser&&(
    currentUser.role==='ADMIN'||
    currentUser.role===dept||
    (dept==='CASH'&&(currentUser.role==='CASHIER'||currentUser.role==='CASH'))
  );
}

function trackingPrCell(r, showPr, noPrCell){
  var tracking = r['TRACKING NO.'] || '—';
  var pr = r['P.R NO.'] || r['P.R #'] || '';
  if (showPr === undefined) showPr = true;
  var trackingCell = '<td><span class="td-tracking" tabindex="0">'+esc2(tracking)+'</span></td>';
  if (noPrCell) return trackingCell;
  return trackingCell + '<td><span class="td-pr">'+esc2(showPr && pr ? pr : '—')+'</span></td>';
}

function getRowFromCache(page, rowNum){
  var target = Number(rowNum);
  var rows = cachedRows[page] || [];
  var row = rows.find(function(r){ return Number(r._rowNum) === target; });
  if (row) return row;
  var dRows = cachedDashboardData[page] || [];
  return dRows.find(function(r){ return Number(r._rowNum) === target; }) || null;
}

function openViewModal(page, rowNum, viewMode){
  var row=getRowFromCache(page, rowNum);
  if(!row){ showToast('Row data unavailable. Please refresh.','error'); return; }

  var titleMap={bac:'BAC',supply:'Supply & Property',budget:'Budget',accounting:'Accounting',cash:'Cashier',rcao:'RCAO',arda:'ARDA',enduser:'Requesting Office'};
  var pr = row['P.R NO.'] || row['P.R #'] || '';
  var isNew = String(row['IS NOTIFIED']||row['IS NEW']||'').trim().toUpperCase() === 'TRUE';
  var isWorkflowDept = ['bac','supply','budget','accounting','cash'].indexOf(String(page||'').toLowerCase()) !== -1;
  var forceAllView = String(viewMode || '').toLowerCase() === 'all' || (isNew && isWorkflowDept);
  var showPr = forceAllView || page === 'bac';
  var idMeta=(row['TRACKING NO.']?('Tracking: '+row['TRACKING NO.']):'')+(showPr && pr ? (' · P.R NO.: '+pr) : '');
  var forwardedFrom = String(row['FORWARDED FROM']||'').trim();
  modalState={mode:'view'};
  document.getElementById('main-modal-title').textContent=(isNew && forwardedFrom ? '🔔 Incoming — ' : 'View ')+(forceAllView ? 'Transaction' : (titleMap[page]||'Transaction'))+' Record';
  document.getElementById('main-modal-meta').textContent=(idMeta?idMeta+' · ':'')+(isNew && forwardedFrom ? 'Forwarded from '+esc2(forwardedFrom) : 'Read-only view');
  document.getElementById('main-modal-save').style.display='none';
  document.getElementById('main-modal-cancel').textContent='Close';
  document.getElementById('main-modal').classList.add('open');
  if (page === 'enduser') {
    var pr = row['P.R NO.'] || row['P.R #'] || '—';
    var returnedBy = row['RETURNED FROM'] || row['FORWARDED FROM'] || '—';
    var remarks    = row['RETURN REMARKS'] || row['FORWARD REMARKS'] || '—';
    var dateTime   = row['RETURNED DATE'] || '—';
    document.getElementById('main-modal-body').innerHTML =
      '<div class="view-summary">'+
        '<div class="view-card">'+
          '<div class="view-label">Tracking No.</div>'+
          '<div class="view-value"><span class="td-tracking">'+esc2(row['TRACKING NO.']||'—')+'</span></div>'+
        '</div>'+
        '<div class="view-card">'+
          '<div class="view-label">P.R No.</div>'+
          '<div class="view-value"><span class="td-pr">'+esc2(pr)+'</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="view-grid">'+
        '<div class="view-field">'+
          '<div class="view-label">Returned By</div>'+
          '<div class="view-value">'+esc2(returnedBy)+'</div>'+
        '</div>'+
        '<div class="view-field">'+
          '<div class="view-label">Date &amp; Time</div>'+
          '<div class="view-value">'+esc2(dateTime)+'</div>'+
        '</div>'+
        '<div class="view-field full">'+
          '<div class="view-label">Remarks</div>'+
          '<div class="view-value">'+esc2(remarks)+'</div>'+
        '</div>'+
      '</div>';
    return;
  }
  if (forceAllView) {
    var allViewHtml = buildRowViewHTML('all', row);
    if (isNew && forwardedFrom) {
      var incomingBanner = '<div class="new-view-banner">'+
        '<div class="nvb-icon">📥</div>'+
        '<div class="nvb-content">'+
          '<div class="nvb-from">Forwarded from <strong>'+esc2(forwardedFrom)+'</strong></div>'+
          (String(row['FORWARD REMARKS']||'').trim() ? '<div class="nvb-remarks">'+esc2(row['FORWARD REMARKS'])+'</div>' : '')+
        '</div>'+
      '</div>';
      allViewHtml = incomingBanner + allViewHtml;
    }
    document.getElementById('main-modal-body').innerHTML = allViewHtml;
    return;
  }
  if (isNew && forwardedFrom) {
    document.getElementById('main-modal-body').innerHTML='<div class="loading"><div class="spinner"></div> Loading forwarded data…</div>';
    var tn = String(row['TRACKING NO.']||'').trim();
    google.script.run
      .withSuccessHandler(function(sourceRow){
        var el = document.getElementById('main-modal-body');
        if (el) el.innerHTML = buildNewItemViewHTML(page, row, forwardedFrom, sourceRow);
      })
      .withFailureHandler(function(){
        var el = document.getElementById('main-modal-body');
        if (el) el.innerHTML = buildRowViewHTML(page, row);
      })
      .getSourceDeptRowByTracking(tn, forwardedFrom);
  } else {
    document.getElementById('main-modal-body').innerHTML=buildRowViewHTML(page,row);
  }
}

function buildRowViewHTML(page,row){
  var fieldOrder={
    all:['DATE RECEIVED','P.R NO.','END-USER / REQUESTED BY','END USER','CATEGORY','PHIGEPS POSTED','APPROVED ABC','RFQ','COMPLETE RFQ RETURNED','RFQ DATE OF COMPLETION','ABSTRACT OF AWARD','AWARDED TO','DATE OF AWARD','MODE OF PROCUREMENT','BAC RESO','BAC RESO STATUS','NOA','NTP','P.O. NO.','P.O. DATE','DOCUMENT TYPE','SUPPLIER','PARTICULARS','P.O. AMOUNT','DATE TRANSMITTED TO SUPPLIER','DATE RECEIVED BY SUPPLIER','COA DATE RECEIVED','I.A.R  NO.','INVOICE  NO.','ORS NO.','BUPR NO.','ORS AMOUNT','DV NO.','NET AMOUNT','TAX AMOUNT','CHEQUE NO. / LDDAP','DATE OF CHEQUE','RCAO','ARDA','CURRENT DEPT','CURRENT STATUS','FORWARDED FROM','FORWARD REMARKS','COMPLETED AT','RETURN TO','RETURNED FROM','RETURN REMARKS','RETURNED DATE','RETURN RECEIVED DATE','RETURN RECEIVED REMARKS'],
    bac:['DATE RECEIVED','P.R NO.','END-USER / REQUESTED BY','CATEGORY','PHIGEPS POSTED','APPROVED ABC','RFQ','COMPLETE RFQ RETURNED','RFQ DATE OF COMPLETION','ABSTRACT OF AWARD','AWARDED TO','DATE OF AWARD','MODE OF PROCUREMENT','BAC RESO','BAC RESO STATUS','NOA','NTP','STATUS','COMPLETED AT'],
    supply:['DATE RECEIVED','P.R NO.','END USER','P.O. NO.','P.O. DATE','DOCUMENT TYPE','SUPPLIER','PARTICULARS','P.O. AMOUNT','DATE TRANSMITTED TO SUPPLIER','DATE RECEIVED BY SUPPLIER','COA DATE RECEIVED','I.A.R  NO.','INVOICE  NO.','STATUS','COMPLETED AT'],
    budget:['DATE RECEIVED','P.R NO.','ORS NO.','BUPR NO.','ORS AMOUNT','STATUS','COMPLETED AT'],
    accounting:['DATE RECEIVED','P.R NO.','DV NO.','NET AMOUNT','TAX AMOUNT','STATUS','COMPLETED AT'],
    cash:['DATE RECEIVED','CHEQUE NO. / LDDAP','DATE OF CHEQUE','STATUS','COMPLETED AT','FORWARD REMARKS','RETURN TO','RETURNED FROM','RETURN REMARKS','RETURNED DATE','RETURN RECEIVED DATE','RETURN RECEIVED REMARKS'],
    rcao:['DATE RECEIVED','STATUS','COMPLETED AT'],
    arda:['DATE RECEIVED','STATUS','COMPLETED AT']
  };

  function valueFor(k){
    var v=row[k];
    if(k==='STATUS') return statusBadge(v||'—');
    if(k==='APPROVED ABC'||k==='AMOUNT'||k==='P.O. AMOUNT'||k==='ORS AMOUNT'||k==='Net Amount'||k==='NET AMOUNT'||k==='TAX Amount'||k==='TAX AMOUNT') return currency(v||'—');
    return esc2(v||'—');
  }

  var isReturnedRecord = String(row['RETURNED DATE'] || '').trim() !== '';

  if (isReturnedRecord && page !== 'all') {
    var returnedFrom = esc2(row['RETURNED FROM'] || '—');
    var returnedToLabel = (typeof returnedToDisplay === 'function') ? returnedToDisplay(row) : String(row['RETURN TO'] || '—');
    var returnedTo = esc2(returnedToLabel || '—');
    var returnRemarks = esc2(row['RETURN REMARKS'] || '—');
    var returnedDate = esc2(row['RETURNED DATE'] || '—');
    return ''+
      '<div class="returned-view">'+
        '<div class="returned-view-top">'+
          '<div class="returned-view-head">'+
            '<div class="returned-view-main">'+
              '<div class="returned-view-tag">Returned Transaction</div>'+
              '<div class="returned-view-id">'+
                '<span class="td-tracking">'+esc2(row['TRACKING NO.']||'—')+'</span>'+
                '<span class="returned-view-sep">/</span>'+ 
                '<span class="td-pr">'+esc2(row['P.R NO.']||row['P.R #']||'—')+'</span>'+ 
              '</div>'+
            '</div>'+
          '</div>'+
          '<div class="returned-view-inline-date">'+
            '<div class="view-label">Returned Date &amp; Time</div>'+
            '<div class="view-value">'+returnedDate+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="returned-view-grid">'+
          '<div class="returned-view-card">'+
            '<div class="view-label">Returned By</div>'+
            '<div class="view-value">'+returnedFrom+'</div>'+
          '</div>'+
          '<div class="returned-view-card">'+
            '<div class="view-label">Returned To</div>'+
            '<div class="view-value">'+returnedTo+'</div>'+
          '</div>'+
          '<div class="returned-view-card full">'+
            '<div class="view-label">Remarks</div>'+
            '<div class="view-value">'+returnRemarks+'</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '';
  }

  var showPr = (page === 'bac' || page === 'all') && String(row['P.R NO.'] || row['P.R #'] || '').trim() !== '';
  var summary=''+
    '<div class="view-summary">'+
      '<div class="view-card">'+
        '<div class="view-label">Tracking No.'+(showPr ? ' / P.R NO.' : '')+'</div>'+
        '<div class="view-value"><span class="td-tracking">'+esc2(row['TRACKING NO.']||'—')+'</span>'+(showPr ? '<br><span class="td-pr">'+esc2(row['P.R NO.']||row['P.R #']||'—')+'</span>' : '')+'</div>'+
      '</div>'+
      '<div class="view-card">'+
        '<div class="view-label">Status</div>'+
        '<div class="view-value">'+statusBadge(row['STATUS']||'—')+'</div>'+
      '</div>'+
    '</div>';

  var RETURN_FIELDS={'RETURN TO':1,'RETURNED FROM':1,'RETURN REMARKS':1,'RETURNED DATE':1,'RETURN RECEIVED DATE':1,'RETURN RECEIVED REMARKS':1};
  var FIELD_LABELS={'RETURN REMARKS':'Remarks','RETURN RECEIVED REMARKS':'Forward Remarks'};
  var fields=(fieldOrder[page]||Object.keys(row)).filter(function(k){
    if(k==='TRACKING NO.'||k==='P.R #'||k==='_rowNum'||k==='IS NOTIFIED'||k==='IS NEW'||k==='STATUS') return false;
    if(page!=='all' && (k==='COMPLETED AT'||k==='FORWARD REMARKS')) return false;
    if(RETURN_FIELDS[k] && !isReturnedRecord) return false;
    return true;
  });
  var grid='<div class="view-grid">'+fields.map(function(k){
    var isLong = k==='PARTICULARS' || k==='ABSTRACT OF AWARD';
    return '<div class="view-field'+(isLong?' full':'')+'">'+
      '<div class="view-label">'+esc2(FIELD_LABELS[k]||k)+'</div>'+
      '<div class="view-value">'+valueFor(k)+'</div>'+
      '</div>';
  }).join('')+'</div>';

  return summary+grid;
}

function buildNewItemViewHTML(page, targetRow, fromDept, sourceRow) {
  var summary = '<div class="view-summary">'+
    '<div class="view-card">'+
      '<div class="view-label">Tracking No.'+(page === 'bac' ? ' / P.R NO.' : '')+'</div>'+
      '<div class="view-value"><span class="td-tracking">'+esc2(targetRow['TRACKING NO.']||'—')+'</span>'+(page === 'bac' && String(targetRow['P.R NO.']||targetRow['P.R #']||'').trim() !== '' ? '<br><span class="td-pr">'+esc2(targetRow['P.R NO.']||targetRow['P.R #']||'—')+'</span>' : '')+'</div>'+
    '</div>'+
    '<div class="view-card">'+
      '<div class="view-label">Date Received</div>'+
      '<div class="view-value" style="font-size:12px;">'+esc2(targetRow['DATE RECEIVED']||'—')+'</div>'+
    '</div>'+
  '</div>';

  var fwdRemarks = String(targetRow['FORWARD REMARKS']||'').trim();
  var banner = '<div class="new-view-banner">'+
    '<div class="nvb-icon">📥</div>'+
    '<div class="nvb-content">'+
      '<div class="nvb-from">Forwarded from <strong>'+esc2(fromDept)+'</strong></div>'+
      (fwdRemarks ? '<div class="nvb-remarks">'+esc2(fwdRemarks)+'</div>' : '')+
    '</div>'+
  '</div>';

  var sectionTitle = '<div class="new-view-section-title">'+esc2(fromDept)+' — Filed Data</div>';
  var sourceFieldsHTML = sourceRow
    ? buildSourceFieldsHTML(sourceRow)
    : '<div style="color:var(--muted);font-size:12.5px;padding:8px 0;">No additional data found from forwarding department.</div>';

  return summary + banner + sectionTitle + sourceFieldsHTML;
}

function buildSourceFieldsHTML(sourceRow) {
  var SKIP = {
    '_rowNum':1,'IS NOTIFIED':1,'IS NEW':1,'TRACKING NO.':1,'P.R #':1,
    'RETURN TO':1,'RETURNED FROM':1,'RETURN REMARKS':1,
    'RETURNED DATE':1,'RETURN RECEIVED DATE':1,'RETURN RECEIVED REMARKS':1,
    'FORWARDED FROM':1,'FORWARDED DATE':1,'FORWARDED TO':1,
    'STATUS':1,'DATE RECEIVED':1
  };
  var CURRENCY_FIELDS = {'APPROVED ABC':1,'AMOUNT':1,'Net Amount':1,'TAX Amount':1};
  var FULL_WIDTH = {'PARTICULARS':1,'ABSTRACT OF AWARD':1,'FORWARD REMARKS':1};

  var fields = Object.keys(sourceRow||{}).filter(function(k){
    if (SKIP[k]) return false;
    if (/\bID\b/.test(k)) return false;
    return String(sourceRow[k]||'').trim() !== '';
  });

  if (!fields.length) return '<div style="color:var(--muted);font-size:12.5px;padding:8px 0;">No data available from forwarding department.</div>';

  function valueFor(k){
    var v = sourceRow[k];
    if (k==='STATUS') return statusBadge(v||'—');
    if (CURRENCY_FIELDS[k]) return currency(v||'—');
    return esc2(v||'—');
  }

  return '<div class="view-grid">'+fields.map(function(k){
    return '<div class="view-field'+(FULL_WIDTH[k]?' full':'')+'">'+
      '<div class="view-label">'+esc2(k)+'</div>'+
      '<div class="view-value">'+valueFor(k)+'</div>'+
    '</div>';
  }).join('')+'</div>';
}
</script>
