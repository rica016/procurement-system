<template id="tpl-bac">
  <div class="tab-nav">
    <button class="tab-btn" id="tab-bac-new" onclick="switchNewSubTab('bac','returns')">🔔 New <span id="bac-new-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-bac-active" onclick="switchTab('bac','active')">Active <span id="bac-active-count" class="badge badge-teal" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-bac-done" onclick="switchTab('bac','done')">Completed <span id="bac-done-count" class="badge badge-grey" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-bac-cancelled" onclick="switchTab('bac','cancelled')">Cancelled <span id="bac-cancelled-count" class="badge badge-down" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-subnav" id="bac-new-subtabs" style="display:none;margin-top:8px;">
    <button class="tab-btn active" id="tab-bac-new-sub-returns" onclick="switchNewSubTab('bac','returns')">Return Transactions <span id="bac-new-returns-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
  </div>
  <div class="panel" id="bac-table-panel">
    <div class="panel-header">
      <div><div class="panel-title">Active Transactions</div><div class="panel-sub" id="bac-panel-sub"></div></div>
      <div class="panel-actions">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="bac-search" placeholder="Search…" oninput="filterRows('bac')"/></div>
        <select class="form-select" id="bac-cat-filter" onchange="filterBacCategory(this.value)" style="font-size:12.5px;padding:6px 10px;height:32px;min-width:140px;">
          <option value="All">All Categories</option>
          <option value="Regular">Regular</option>
          <option value="SPLIT">SPLIT</option>
          <option value="Agri-Agra">Agri-Agra</option>
          <option value="IPARC">IPARC</option>
        </select>
        <button class="tb-btn primary" onclick="openCreateModal()">＋ New Transaction</button>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="bac-thead"><tr>
        <th>Tracking No.</th><th>P.R No.</th><th>Date Received</th><th>End User</th><th>Category</th><th>PHIGEPS Posted</th><th>Approved ABC</th>
        <th>RFQ</th><th>Complete RFQ Returned</th><th>RFQ Date of Completion</th><th>Abstract of Award</th>
        <th>Awarded To</th><th>Date of Award</th><th>Mode of Procurement</th><th>BAC Reso</th><th>BAC Reso Status</th><th>NOA</th><th>NTP</th>
        <th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody id="bac-tbody"><tr><td colspan="20"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
