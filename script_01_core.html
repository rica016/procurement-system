//  DATE CONVERSION HELPERS

function toDateInput(v) {
  if (!v || String(v).trim() === '' || String(v).trim() === '—') return '';
  try {
    var d = new Date(String(v).trim());
    if (isNaN(d.getTime())) return '';
    var yyyy = d.getFullYear();
    var mm   = String(d.getMonth() + 1).padStart(2,'0');
    var dd   = String(d.getDate()).padStart(2,'0');
    return yyyy + '-' + mm + '-' + dd;
  } catch(e) { return ''; }
}
function fromDateInput(v) {
  if (!v || String(v).trim() === '') return '';
  try {
    var parts = String(v).trim().split('-');
    if (parts.length !== 3) return v;
    var yr=parseInt(parts[0],10), mo=parseInt(parts[1],10)-1, dy=parseInt(parts[2],10);
    var d = new Date(yr,mo,dy);
    if (isNaN(d.getTime())) return v;
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var dayStr=String(d.getDate()); dayStr=dayStr.length<2?'0'+dayStr:dayStr;
    return months[d.getMonth()]+' '+dayStr+', '+d.getFullYear();
  } catch(e) { return v; }
}

function doLogin() {
  var u   = (document.getElementById('login-username').value||'').trim();
  var p   = (document.getElementById('login-password').value||'').trim();
  var btn = document.getElementById('login-btn');
  if (!u||!p) { showLoginErr('Please enter username and password.'); return; }
  btn.textContent='Signing in…'; btn.disabled=true;
  document.getElementById('login-err').classList.remove('show');
  google.script.run
    .withSuccessHandler(function(res){
      btn.textContent='Sign In →'; btn.disabled=false;
      if (res.success) {
        currentUser = { username:res.username, role:res.role, isEndUser:res.isEndUser };
        document.getElementById('login-screen').style.display='none';
        initApp();
      } else { showLoginErr(res.message||'Login failed.'); }
    })
    .withFailureHandler(function(e){ btn.textContent='Sign In →'; btn.disabled=false; showLoginErr('Server error: '+e.message); })
    .loginUser(u, p);
}
function showLoginErr(m){ var el=document.getElementById('login-err'); el.textContent=m; el.classList.add('show'); }
document.getElementById('login-password').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
document.getElementById('login-username').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('login-password').focus(); });

function doLogout(){

  document.getElementById('login-password').value='';
  document.getElementById('login-err').classList.remove('show');
}

    '</div>';

  document.getElementById('profile-modal-save').disabled=false;
  document.getElementById('profile-modal').classList.add('open');
}

function onProfileChangePasswordToggle(){
  var checked = !!((document.getElementById('pf-change-password')||{}).checked);
  var curWrap = document.getElementById('pf-current-password-wrap');
  var passWrap = document.getElementById('pf-password-fields');
  var curEl = document.getElementById('pf-current-password');
  var newEl = document.getElementById('pf-new-password');
  var confirmEl = document.getElementById('pf-confirm-password');

  if (curWrap) curWrap.style.display = checked ? '' : 'none';
  if (passWrap) passWrap.style.display = checked ? '' : 'none';

  if (!checked) {
    if (curEl) curEl.value = '';
    if (newEl) { newEl.value = ''; newEl.disabled = true; }
    if (confirmEl) { confirmEl.value = ''; confirmEl.disabled = true; }
    return;
  }

  onProfileCurrentPasswordInput();
}

function onProfileCurrentPasswordInput(){
  var curVal = (document.getElementById('pf-current-password')||{}).value || '';
  var canEditNew = curVal.trim() !== '';
  var newEl = document.getElementById('pf-new-password');
  var confirmEl = document.getElementById('pf-confirm-password');
  if (newEl) {
    newEl.disabled = !canEditNew;
    if (!canEditNew) newEl.value = '';
  }
  if (confirmEl) {
    confirmEl.disabled = !canEditNew;
    if (!canEditNew) confirmEl.value = '';
  }
}

function closeProfileModal(e){
  if(e&&e.target!==document.getElementById('profile-modal')) return;
  document.getElementById('profile-modal').classList.remove('open');
  profileModalState={};
}

function saveProfileModal(){
  if (!currentUser) return;
  var btn = document.getElementById('profile-modal-save');
  var firstName = (document.getElementById('pf-first-name').value||'').trim();
  var lastName = (document.getElementById('pf-last-name').value||'').trim();
  var username = (document.getElementById('pf-username').value||'').trim();
  var wantsPasswordChange = !!((document.getElementById('pf-change-password')||{}).checked);
  var currentPassword = wantsPasswordChange ? (document.getElementById('pf-current-password').value||'').trim() : '';
  var newPassword = wantsPasswordChange ? (document.getElementById('pf-new-password').value||'').trim() : '';
  var confirmPassword = wantsPasswordChange ? (document.getElementById('pf-confirm-password').value||'').trim() : '';

  if (!username) { showToast('Username is required.','error'); return; }
  if (wantsPasswordChange && !currentPassword) { showToast('Current password is required to change password.','error'); return; }
  if (wantsPasswordChange && !newPassword) { showToast('New password is required.','error'); return; }
  if (wantsPasswordChange && newPassword !== confirmPassword) { showToast('New password and confirmation do not match.','error'); return; }

  btn.disabled=true;
  btn.textContent='Saving…';
  google.script.run
    .withSuccessHandler(function(res){
      btn.disabled=false;
      btn.textContent='Save Profile';
      if (!res || !res.success) {
        showToast('Error: '+((res&&res.message)||'Unable to update profile.'),'error');
        return;
      }

      currentUser.firstName = res.firstName || firstName;
      currentUser.lastName = res.lastName || lastName;
      currentUser.username = res.username || username;
      currentUser.role = res.role || currentUser.role;
      currentUser.isEndUser = res.isEndUser!==undefined ? !!res.isEndUser : currentUser.isEndUser;

      document.getElementById('user-avatar').textContent = currentUser.username.charAt(0).toUpperCase();
      document.getElementById('user-name').textContent   = currentUser.username;
      document.getElementById('user-role').textContent   = currentUser.role;

      closeProfileModal();
      showToast('Profile updated successfully.','success');
    })
    .withFailureHandler(function(e){
      btn.disabled=false;
      btn.textContent='Save Profile';
      showToast('Error: '+e.message,'error');
    })
    .updateMyCredentials(currentUser.username, currentPassword, {
      firstName: firstName,
      lastName: lastName,
      username: username,
      newPassword: newPassword
    });
}

function initApp(){
  var role      = currentUser.role;
  var isEndUser = currentUser.isEndUser || END_USER_ROLES_JS.indexOf(role) !== -1;
  currentUser.isEndUser = isEndUser;

  document.getElementById('user-avatar').textContent = currentUser.username.charAt(0).toUpperCase();
  document.getElementById('user-name').textContent   = currentUser.username;
  document.getElementById('user-role').textContent   = role;

  document.querySelectorAll('.nav-dashboard,.nav-myreqs,.nav-bac,.nav-supply,.nav-budget,.nav-accounting,.nav-cash,.nav-rcao,.nav-arda,.nav-track,.nav-users,.nav-suppliers,.nav-endusers,.nav-audit')
    .forEach(function(el){ el.classList.add('hidden'); });

  var navMap = {
    'BAC':        ['.nav-bac','.nav-track'],
    'SUPPLY':     ['.nav-supply','.nav-track'],
    'BUDGET':     ['.nav-budget','.nav-track'],
    'ACCOUNTING': ['.nav-accounting','.nav-track'],
    'CASHIER':    ['.nav-cash','.nav-track'],
    'CASH':       ['.nav-cash','.nav-track'],
    'RCAO':       ['.nav-rcao','.nav-track'],
    'ARDA':       ['.nav-arda','.nav-track'],
    'ADMIN':      ['.nav-dashboard','.nav-track','.nav-users','.nav-suppliers','.nav-endusers','.nav-audit']
  };

  if (isEndUser && role !== 'ADMIN') {
    ['.nav-myreqs','.nav-track'].forEach(function(sel){
      document.querySelectorAll(sel).forEach(function(el){ el.classList.remove('hidden'); });
    });
  } else {
    (navMap[role]||['.nav-track']).forEach(function(sel){
      document.querySelectorAll(sel).forEach(function(el){ el.classList.remove('hidden'); });
    });
  }

  document.getElementById('app-screen').style.display='block';

  google.script.run.withSuccessHandler(function(list){ offices=list||[]; injectDatalist('office-datalist',offices); }).getRequestingOffices();
  refreshSupplierDatalist();
  refreshEndUserDatalist();

  var staffDefaults = { 'BAC':'bac','SUPPLY':'supply','BUDGET':'budget','ACCOUNTING':'accounting','CASHIER':'cash','CASH':'cash','RCAO':'rcao','ARDA':'arda' };
  var startPage = role === 'ADMIN'    ? 'dashboard'
                : isEndUser           ? 'myreqs'
                : (staffDefaults[role]||'track');
  navigate(startPage);

  autoRefreshId = setInterval(function(){ loadData(); }, 600000);
  document.getElementById('live-indicator').style.display='inline';
}

function injectDatalist(id, vals){
  var old=document.getElementById(id); if(old) old.parentNode.removeChild(old);
  var dl=document.createElement('datalist'); dl.id=id;
  vals.forEach(function(v){ var o=document.createElement('option'); o.value=v; dl.appendChild(o); });
  document.body.appendChild(dl);
}

function renderSupplierDatalistOptions(vals){
  injectDatalist('supplier-datalist', vals || []);
}

function updateSupplierDatalistByQuery(query){
  var q = String(query||'').trim().toLowerCase();
  if (!q) {
    renderSupplierDatalistOptions((suppliers||[]).slice(0,5));
    return;
  }
  var matched = (suppliers||[]).filter(function(v){ return String(v||'').toLowerCase().indexOf(q)!==-1; });
  renderSupplierDatalistOptions(matched);
}

function handleSupplierInput(inputEl, forceUpper){
  if (!inputEl) return;
  if (forceUpper) inputEl.value = String(inputEl.value||'').toUpperCase();
  updateSupplierDatalistByQuery(inputEl.value || '');
}

function refreshSupplierDatalist(){
  google.script.run.withSuccessHandler(function(list){
    suppliers=list||[];
    renderSupplierDatalistOptions(suppliers.slice(0,5));
  }).getSuppliers();
}

function refreshEndUserDatalist(){
  google.script.run.withSuccessHandler(function(list){ endUsers=list||[]; injectDatalist('enduser-datalist',endUsers); }).getEndUsers();
}

function navigate(page){
  currentPage=page;
  var meta=PAGE_META[page]||{title:page,sub:''};
  document.getElementById('topbar-title').textContent=meta.title;
  document.getElementById('topbar-sub').textContent=meta.sub;
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.toggle('active',el.getAttribute('data-page')===page); });
  var pc=document.getElementById('page-content');
  pc.innerHTML=''; pc.className='page'; void pc.offsetWidth;
  if (PAGE_TEMPLATES[page]){ pc.innerHTML=PAGE_TEMPLATES[page](); loadData(); }
}
function loadData(){ if(currentPage&&PAGE_LOADERS[currentPage]) PAGE_LOADERS[currentPage](); }

function departmentPageNav(active){
  var steps=[
    {k:'bac',l:'BAC',badge:'badge-amber'},
    {k:'supply',l:'Supply',badge:'badge-teal'},
    {k:'budget',l:'Budget',badge:'badge-violet'},
    {k:'rcao',l:'RCAO',badge:'badge-op'},
    {k:'arda',l:'ARDA',badge:'badge-op'},
    {k:'accounting',l:'Accounting',badge:'badge-blue'},
    {k:'cash',l:'Cashier',badge:'badge-op'}
  ];
  return '<div class="tab-nav" style="margin-top:12px;">'+steps.map(function(s){
    var cls=s.k===active?'tab-btn active':'tab-btn';
    return '<button class="'+cls+'" id="tab-deptnav-'+s.k+'" onclick="navigate(\''+s.k+'\')">'+
      s.l+' <span id="deptnav-count-'+s.k+'" class="badge '+s.badge+'" style="margin-left:4px;"></span></button>';
  }).join('')+'</div>';
}

function refreshDepartmentPageNavCounts(){
  google.script.run
    .withSuccessHandler(function(counts){
      counts=counts||{};
      ['bac','supply','budget','accounting','cash','rcao','arda'].forEach(function(key){
        var el=document.getElementById('deptnav-count-'+key);
        if(el) el.textContent=counts[key]||0;
      });
    })

}

function renderIncludedTemplate(templateId, replacements) {
  var el = document.getElementById(templateId);
  if (!el) return '';
  var html = el.innerHTML;
  var map = replacements || {};
  Object.keys(map).forEach(function(key) {
    html = html.split(key).join(map[key]);
  });
  return html;
}

var PAGE_TEMPLATES={
  dashboard:function(){ return renderIncludedTemplate('tpl-dashboard'); },
  myreqs:function(){
    ['bac','supply','budget','accounting','cash','rcao','arda'].forEach(function(page){
      document.querySelectorAll('.nav-'+page).forEach(function(el){ el.classList.add('hidden'); });
    });
    return renderIncludedTemplate('tpl-myreqs', {
      '{{CURRENT_ROLE}}': esc2(currentUser && currentUser.role ? currentUser.role : '—')
    });
  },
  bac:function(){ return renderIncludedTemplate('tpl-bac', {'{{DEPT_SWITCHER}}': departmentPageNav('bac')}); },
  supply:function(){ return renderIncludedTemplate('tpl-supply', {'{{DEPT_SWITCHER}}': departmentPageNav('supply')}); },
  budget:function(){ return renderIncludedTemplate('tpl-budget', {'{{DEPT_SWITCHER}}': departmentPageNav('budget')}); },

  audit:function(){ return renderIncludedTemplate('tpl-audit'); }

var _trackingCopyBound = false;
function bindTrackingCopyBehavior() {
  if (_trackingCopyBound) return;
  _trackingCopyBound = true;
  document.addEventListener('click', function(e) {
    var el = e.target && e.target.closest ? e.target.closest('.td-tracking') : null;
    if (!el) return;
    var text = String(el.textContent || '').trim();
    if (!text || text === '—') return;
    if (window.getSelection && String(window.getSelection()).trim() !== '') return;
    if (!navigator.clipboard || typeof navigator.clipboard.writeText !== 'function') return;
    navigator.clipboard.writeText(text).then(function() {
      if (typeof showToast === 'function') showToast('Tracking No. copied.', 'info');
    }).catch(function(){});
  });
}

bindTrackingCopyBehavior();
