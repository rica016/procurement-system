<template id="tpl-users">
  <div class="section-head">
    <div></div>
    <div class="section-actions">
      <button class="tb-btn btn-mgmt-export" onclick="showExportChoice(this,printUsersTable,csvExportUsersTable)" title="Export user list">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Export ▾
      </button>
      <button class="tb-btn primary" onclick="openAddUserModal()">＋ Add User</button>
    </div>
  </div>
  <div class="panel" style="margin-bottom:24px;">
    <div class="panel-header">
      <div><div class="panel-title">Department</div><div class="panel-sub" id="staff-panel-sub"></div></div>
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="staff-search" placeholder="Search department users…" oninput="filterStaffTable()"/></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>First Name</th><th>Last Name</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="staff-tbody"><tr><td colspan="6"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div><div class="panel-title">End Users</div><div class="panel-sub" id="endusers-users-panel-sub"></div></div>
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="endusers-users-search" placeholder="Search end users…" oninput="filterEndUsersUsersTable()"/></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>First Name</th><th>Last Name</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="endusers-users-tbody"><tr><td colspan="6"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
