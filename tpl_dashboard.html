<template id="tpl-dashboard">
  <!-- ── ANALYTICS STAT CARDS ── -->
  <div class="db-stat-grid" id="dashboard-stat-grid">
    <div class="loading"><div class="spinner"></div> Computing analytics…</div>
  </div>

  <!-- ── PIPELINE + NEEDS ATTENTION ── -->
  <div class="db-two-col">
    <div class="panel" style="margin-bottom:0;">
      <div class="panel-header">
        <div>
          <div class="panel-title">📊 Procurement Pipeline</div>
          <div class="panel-sub">Active workload per department — click to navigate</div>
        </div>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
      <div class="panel-body" id="dashboard-pipeline">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:0;">
      <div class="panel-header">
        <div>
          <div class="panel-title">⚠ Needs Attention</div>
          <div class="panel-sub" id="dashboard-alerts-sub">Returned items awaiting action</div>
        </div>
      </div>
      <div id="dashboard-alerts" style="max-height:296px;overflow-y:auto;">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>
    </div>
  </div>

  <!-- ── STATUS + DEPT TABS ── -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-dashboard-all" onclick="switchDashboardTab('all')">All <span id="dashboard-count-all" class="badge badge-grey" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-active" onclick="switchDashboardTab('active')">In Progress <span id="dashboard-count-active" class="badge badge-blue" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-returned" onclick="switchDashboardTab('returned')">Returned <span id="dashboard-count-returned" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-completed" onclick="switchDashboardTab('completed')">Completed <span id="dashboard-count-completed" class="badge badge-op" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-cancelled" onclick="switchDashboardTab('cancelled')">Cancelled <span id="dashboard-count-cancelled" class="badge badge-down" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-nav" style="margin-top:-8px;">
    <button class="tab-btn" id="tab-dashboard-dept-all" onclick="switchDashboardDeptTab('all')">All Departments <span id="dashboard-dept-count-all" class="badge badge-grey" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-dashboard-dept-bac" onclick="switchDashboardDeptTab('bac')">BAC <span id="dashboard-dept-count-bac" class="badge badge-amber" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-dept-supply" onclick="switchDashboardDeptTab('supply')">Supply <span id="dashboard-dept-count-supply" class="badge badge-teal" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-dept-budget" onclick="switchDashboardDeptTab('budget')">Budget <span id="dashboard-dept-count-budget" class="badge badge-violet" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-dept-accounting" onclick="switchDashboardDeptTab('accounting')">Accounting <span id="dashboard-dept-count-accounting" class="badge badge-blue" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-dept-cash" onclick="switchDashboardDeptTab('cash')">Cashier <span id="dashboard-dept-count-cash" class="badge badge-op" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-dashboard-dept-enduser" onclick="switchDashboardDeptTab('enduser')">REQUESTING OFFICES <span id="dashboard-dept-count-enduser" class="badge badge-grey" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-subnav" id="dashboard-enduser-subtabs" style="display:none;margin-top:8px;">
    <button class="tab-btn active" id="tab-dashboard-enduser-sub-nottaken" onclick="switchDashboardEnduserSubTab('nottaken')">Not Taken</button>
    <button class="tab-btn" id="tab-dashboard-enduser-sub-done" onclick="switchDashboardEnduserSubTab('done')">Completed</button>
  </div>
  <div class="bac-cat-filter" id="dashboard-bac-cat-filter">
    <span class="bac-cat-filter-label">Category:</span>
    <button class="cat-chip active" onclick="filterBacCategory('All')">All</button>
    <button class="cat-chip" onclick="filterBacCategory('Regular')">Regular</button>
    <button class="cat-chip" onclick="filterBacCategory('SPLIT')">SPLIT</button>
    <button class="cat-chip" onclick="filterBacCategory('Agri-Agra')">Agri-Agra</button>
    <button class="cat-chip" onclick="filterBacCategory('IPARC')">IPARC</button>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div><div class="panel-title" id="dashboard-panel-title">All Transactions</div><div class="panel-sub" id="dashboard-sub"></div></div>
      <div class="panel-actions">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="dashboard-search" placeholder="Search tracking no., office, P.R #…" oninput="filterDashboard()"/></div>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="dashboard-thead"><tr><th>P.R # / Tracking No.</th><th>Loading…</th></tr></thead>
      <tbody id="dashboard-tbody"><tr><td colspan="8"><div class="loading"><div class="spinner"></div> Loading transactions…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
