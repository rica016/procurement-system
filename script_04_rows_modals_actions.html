<script>
function returnedFromDisplayValue(r){
  var keys=['RETURNED FROM','RETURNED BY','RETURNED FROM DEPT','RETURN BY','RETURNER'];
  for (var i = 0; i < keys.length; i++) {
    var value = String(r && r[keys[i]] || '').trim();
    if (value) return value;
  }
  return '—';
}

function returnedRemarksDisplayValue(r){
  var keys=['RETURN REMARKS','RETURNED REMARKS','RETURNED BY REMARKS'];
  for (var i = 0; i < keys.length; i++) {
    var value = String(r && r[keys[i]] || '').trim();
    if (value) return value;
  }
  return '—';
}

function returnedToDisplay(r){
  var rt=String(r['RETURN TO']||'').trim();
  if(rt!== 'Requesting Office') return rt||'—';
  var eu=String(r['END-USER / REQUESTED BY']||r['END USER']||r['REQUESTED BY']||'').trim();
  return eu||'Requesting Office';
}

function forwardedFromDisplay(r, page){
  var v=String(r['FORWARDED FROM']||'').trim();
  if(v) return v;
  var fallback={bac:'Requesting Office',supply:'BAC',budget:'Supply',accounting:'Budget',cash:'Accounting',rcao:'Accounting',arda:'RCAO'};
  return fallback[page]||'—';
}

function notificationHintBadge(r){
  var notified = String(r['IS NOTIFIED']||'').trim().toUpperCase() === 'TRUE';
  return notified
    ? '<span class="badge badge-teal" style="margin-left:6px;vertical-align:middle;">Notified</span>'
    : '<span class="badge badge-warn" style="margin-left:6px;vertical-align:middle;">Pending</span>';
}

function canContinueReturnDone(r, page){
  // User must be able to edit this department
  var deptMap={bac:'BAC',supply:'SUPPLY',budget:'BUDGET',accounting:'ACCOUNTING',cash:'CASH'};
  if(!canEdit(deptMap[page]||page.toUpperCase())) return false;
  
  // Record's RETURNED FROM must match this department's aliases
  var rf=returnedFromDisplayValue(r).toUpperCase();
  var aliases={
    bac:['BAC'],
    supply:['SUPPLY','SUPPLY AND PROPERTY'],
    budget:['BUDGET'],
    accounting:['ACCOUNTING'],
    cash:['CASH','CASHIER']
  };
  var list=aliases[page]||[];
  return list.indexOf(rf)!==-1;
}

function continueReturnDone(sheetName, rowNum, page, btn){
  if(!btn) btn=event.target; // fallback if not passed
  var originalText=btn.textContent;
  btn.textContent='Continuing…'; btn.disabled=true;
  
  var data = {
    'STATUS':'PROCESSING',
    'COMPLETED AT':'',
      'IS NOTIFIED':'', 
    'IS NEW':'',
    'RETURN TO':'',
    'RETURNED FROM':'',
    'RETURN REMARKS':'',
    'RETURNED DATE':'',
    'RETURN RECEIVED DATE':'',
    'RETURN RECEIVED REMARKS':''
  };

  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.success){
        showToast('Transaction continued and set to PROCESSING.','success');
        loadData();
        setTimeout(function(){ switchTab(page,'active'); }, 150);
      } else {
        btn.textContent=originalText; btn.disabled=false;
        showToast('Error: '+(res&&res.message||'Unknown'),'error');
      }
    })
    .withFailureHandler(function(e){ 
      btn.textContent=originalText; btn.disabled=false;
      showToast('Error: '+e.message,'error'); 
    })
    .updateTransaction(sheetName, rowNum, data, currentUser.username);
}

function continueReturnedNew(sheetName, rowNum, page, btn){
  if(!btn) btn=event.target;
  var originalText=btn.textContent;
  btn.textContent='Continuing…'; btn.disabled=true;

  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.success){
        showToast('Transaction continued.','success');
        loadData();
        setTimeout(function(){ switchTab(page,'active'); }, 150);
      } else {
        btn.textContent=originalText; btn.disabled=false;
        showToast('Error: '+(res&&res.message||'Unknown'),'error');
      }
    })
    .withFailureHandler(function(e){
      btn.textContent=originalText; btn.disabled=false;
      showToast('Error: '+e.message,'error');
    })
    .continueReturnedNew(sheetName, rowNum, currentUser.username);
}

function getReprocessStatusForPage(page){
  var _ = page;
  return 'PROCESSING';
}

function reopenCompletedRecord(sheetName, rowNum, page, btn){
  if(!btn) btn=event.target;
  var originalText=btn.textContent;
  var targetStatus=getReprocessStatusForPage(page);
  btn.textContent='Undoing…'; btn.disabled=true;

  var data = {
    'STATUS':targetStatus,
    'COMPLETED AT':'',
    'IS NOTIFIED':'',
    'IS NEW':''
  };

  google.script.run
    .withSuccessHandler(function(res){
      if(res&&res.success){
        showToast('Transaction moved back to '+targetStatus+'.','success');
        loadData();
        setTimeout(function(){ switchTab(page,'active'); }, 150);
      } else {
        btn.textContent=originalText; btn.disabled=false;
        showToast('Error: '+(res&&res.message||'Unknown'),'error');
      }
    })
    .withFailureHandler(function(e){
      btn.textContent=originalText; btn.disabled=false;
      showToast('Error: '+e.message,'error');
    })
    .updateTransaction(sheetName, rowNum, data, currentUser.username);
}

//  SEARCH / FILTER
// ═══════════════════════════════════════════════════════════════════════════════
var _bacCatFilter = 'All';

function filterRows(page){
  if (page === 'bac') { applyBacFilters(); return; }
  var searchIds={supply:'supply-search',budget:'budget-search',accounting:'acctg-search',cash:'cash-search',rcao:'rcao-search',arda:'arda-search'};
  var tbIds={supply:'supply-tbody',budget:'budget-tbody',accounting:'acctg-tbody',cash:'cash-tbody',rcao:'rcao-tbody',arda:'arda-tbody'};
  var qEl=document.getElementById(searchIds[page]);
  var tb =document.getElementById(tbIds[page]);
  if(!qEl||!tb) return;
  var q=qEl.value.toLowerCase();
  tb.querySelectorAll('tr').forEach(function(r){ r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'; });
}

function filterBacCategory(cat) {
  _bacCatFilter = cat;
  document.querySelectorAll('.cat-chip').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent.trim() === cat);
  });
  // Sync all category filter selects across all pages
  document.querySelectorAll('select[id$="-cat-filter"]').forEach(function(sel) {
    sel.value = cat;
  });

  // Always reload current page data after category change.
  if (typeof loadData === 'function') {
    loadData();
    return;
  }

  if (typeof ensureTransactionCategoryIndex === 'function') {
    ensureTransactionCategoryIndex(function(){
      if (typeof applyBacFilters === 'function') applyBacFilters();
      if (typeof currentPage === 'string' && ['bac','supply','budget','accounting','cash'].indexOf(currentPage) !== -1 && typeof renderPageData === 'function') {
        renderPageData(currentPage, cachedRows[currentPage] || []);
        if (typeof filterRows === 'function') filterRows(currentPage);
      }

      if (typeof renderDashboardTable === 'function') {
        renderDashboardTable();
        if (typeof filterDashboard === 'function') filterDashboard();
      }
      if (typeof currentPage === 'string' && currentPage === 'myreqs' && typeof PAGE_LOADERS !== 'undefined' && PAGE_LOADERS && typeof PAGE_LOADERS.myreqs === 'function') {
        PAGE_LOADERS.myreqs();
      } else if (typeof renderMyReqsTable === 'function') {
        renderMyReqsTable(cachedMyReqs || []);
        if (typeof filterMyReqs === 'function') filterMyReqs();
      }
      if (typeof syncBacCategoryFilterVisibility === 'function') {
        syncBacCategoryFilterVisibility();
      }
    });
    return;
  }

  applyBacFilters();

  if (typeof renderDashboardTable === 'function') {
    renderDashboardTable();
    if (typeof filterDashboard === 'function') filterDashboard();
  }
  if (typeof renderMyReqsTable === 'function') {
    renderMyReqsTable(cachedMyReqs || []);
    if (typeof filterMyReqs === 'function') filterMyReqs();
  }
  if (typeof syncBacCategoryFilterVisibility === 'function') {
    syncBacCategoryFilterVisibility();
  }
}

function applyBacFilters() {
  var q = ((document.getElementById('bac-search')||{}).value||'').toLowerCase();
  var tb = document.getElementById('bac-tbody');
  if (!tb) return;
  var catTabs = ['active','new','done','cancelled'];
  var tab = (typeof tabState !== 'undefined' && tabState['bac']) || 'active';
  var useCat = catTabs.indexOf(tab) !== -1;
  tb.querySelectorAll('tr').forEach(function(row) {
    var textMatch = !q || row.textContent.toLowerCase().includes(q);
    var rowCat = (row.getAttribute('data-category') || '').trim();
    var catMatch = !useCat || _bacCatFilter === 'All' || rowCat === _bacCatFilter;
    row.style.display = (textMatch && catMatch) ? '' : 'none';
  });
}

function buildFormHTML(fields, prefix, existingData){
  var html='<div class="form-grid">';
  fields.forEach(function(f){
    var id  = prefix+f.key.replace(/[^a-z0-9]/gi,'_');
    var val = (existingData&&existingData[f.key]!==undefined)?existingData[f.key]:'';
    var req = f.required?'<span class="req">*</span>':'';
    var isParticulars = String(f.key||'').toUpperCase()==='PARTICULARS';
    html+='<div class="form-group'+((f.full||isParticulars)?' full':'')+'">'+
          '<label class="form-label">'+f.label+' '+req+'</label>';
    if(f.type==='select'){
      html+='<select class="form-select" id="'+id+'"><option value="">— Select —</option>'+
            (f.options||[]).map(function(o){ return '<option'+(o===val?' selected':'')+' value="'+esc(o)+'">'+esc(o)+'</option>'; }).join('')+'</select>';
    } else if(f.type==='date'){
      html+='<input class="form-input" type="date" id="'+id+'" value="'+esc(toDateInput(val))+'"/>';
    } else if(f.type==='office'){
      html+='<input class="form-input" type="text" id="'+id+'" value="'+esc(val)+'" placeholder="Type or select office…" list="office-datalist" autocomplete="off"/>';
    } else if(f.type==='supplier'){
      var supplierKey = String(f.key||'').toUpperCase();
      var forceUpper = supplierKey==='AWARDED TO' || supplierKey==='SUPPLIER';
      html+='<input class="form-input" type="text" id="'+id+'" value="'+esc(forceUpper?String(val||'').toUpperCase():val)+'" placeholder="Type or select supplier…" list="supplier-datalist" autocomplete="off" onfocus="updateSupplierDatalistByQuery(this.value||\'\')" oninput="handleSupplierInput(this,'+(forceUpper?'true':'false')+')"/>';
    } else if(f.type==='enduser'){
      var euOpts=endUsers.map(function(r){ return '<option'+(r===val?' selected':'')+' value="'+esc(r)+'">'+esc2(r)+'</option>'; }).join('');
      html+='<select class="form-select" id="'+id+'"><option value="">— Select End User —</option>'+euOpts+'</select>';
    } else if(f.type==='checkdate'){
      var hasVal=!!(val&&String(val).trim());
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'+
            '<input type="checkbox" id="'+id+'_has" onchange="(function(cb){var d=document.getElementById(\'' +id+ '\');d.style.display=cb.checked?\'block\':\'none\';})(this)"'+(hasVal?' checked':'')+' style="width:16px;height:16px;cursor:pointer;"/>'+
            '<span style="font-size:13px;color:var(--text2);">Has PhilGEPS</span>'+
            '</div>'+
            '<input class="form-input" type="date" id="'+id+'" value="'+esc(toDateInput(val))+'" style="display:'+(hasVal?'block':'none')+'"/>';
    } else if(f.type==='textarea' || isParticulars){
      html+='<textarea class="form-textarea" id="'+id+'" placeholder="'+f.label+'">'+esc(val||'')+'</textarea>';
    } else {
      html+='<input class="form-input" type="'+f.type+'" id="'+id+'" value="'+esc(val)+'" placeholder="'+f.label+'"'+(f.readonly?' readonly':'')+'/>';
    }
    if(f.hint) html+='<div class="form-hint">'+f.hint+'</div>';
    html+='</div>';
  });
  return html+'</div>';
}
function readFormData(fields, prefix){
  var data={};
  fields.forEach(function(f){
    var el=document.getElementById(prefix+f.key.replace(/[^a-z0-9]/gi,'_'));
    if (!el) { data[f.key]=''; return; }
    if(f.type==='checkdate'){
      var cbEl=document.getElementById(prefix+f.key.replace(/[^a-z0-9]/gi,'_')+'_has');
      data[f.key]=(cbEl&&cbEl.checked)?fromDateInput(el.value.trim()):'';
    } else {
      data[f.key]=f.type==='date'?fromDateInput(el.value.trim()):el.value.trim();
      var normalizedKey = String(f.key||'').toUpperCase();
      if (normalizedKey==='AWARDED TO' || normalizedKey==='SUPPLIER') {
        data[f.key]=String(data[f.key]||'').toUpperCase();
      }
    }
  });
  return data;
}

//  SAVE MAIN MODAL — handles create / dept edit / end-user edit
// ═══════════════════════════════════════════════════════════════════════════════
function saveMainModal(){
  var btn=document.getElementById('main-modal-save');

  // ── END USER EDIT mode — saves 3 Supply date fields ──
  if (modalState.mode === 'enduser-edit') {
    var data = readFormData(EU_EDIT_FIELDS, 'mf_');
    btn.textContent='Saving…'; btn.disabled=true;
    google.script.run
      .withSuccessHandler(function(res){
        btn.textContent='Save Updates'; btn.disabled=false;
        document.getElementById('main-modal').classList.remove('open');
        if(res&&res.success){
          showToast('✅ Supply dates updated successfully.','success');
          loadData();
        } else {
          showToast('Error: '+(res&&res.message||'Unknown'),'error');
        }
        modalState={};
      })
      .withFailureHandler(function(e){ btn.textContent='Save Updates'; btn.disabled=false; showToast('Error: '+e.message,'error'); })
      .updateEndUserSupplyFields(modalState.supRowNum, data, currentUser.username);
    return;
  }

  if (modalState.mode === 'pr-edit') {
    var newPrNo = (document.getElementById('mf_prno') || {value:''}).value.trim();
    var tn = modalState.trackingNo;
    btn.textContent = 'Updating…'; btn.disabled = true;
    google.script.run
      .withSuccessHandler(function(res) {
        btn.textContent = 'Update P.R #'; btn.disabled = false;
        document.getElementById('main-modal').classList.remove('open');
        if (res && res.success) {
          showToast('P.R # updated across ' + res.updatedCount + ' row' + (res.updatedCount !== 1 ? 's' : '') + '.', 'success');
          loadData();
        } else {
          showToast('Error: ' + (res && res.message || 'Unknown'), 'error');
        }
        modalState = {}; prState = {};
      })
      .withFailureHandler(function(e) { btn.textContent = 'Update P.R #'; btn.disabled = false; showToast('Error: ' + e.message, 'error'); })
      .updatePrNumber(tn, newPrNo, currentUser.username);
    return;
  }

  if (modalState.mode === 'return-complete') {
    var remarks = (document.getElementById('mf_return_complete_remarks') || {value:''}).value.trim();
    var forwardTo = (document.getElementById('mf_return_complete_forward_to') || {value:''}).value.trim();
    if (!remarks) {
      showToast('Forward remarks are required before receiving this item.','error');
      return;
    }
    if (!forwardTo) {
      showToast('Forward To Department is required.','error');
      return;
    }
    var returnStateSnapshot = {
      sheetName: modalState.sheetName,
      rowNum: modalState.rowNum,
      returnContext: modalState.returnContext,
      returnPage: modalState.returnPage,
      forwardTo: forwardTo
    };
    btn.textContent='Receiving…'; btn.disabled=true;
    google.script.run
      .withSuccessHandler(function(res){
        btn.textContent='Receive & Forward'; btn.disabled=false;
        document.getElementById('main-modal').classList.remove('open');
        if(res&&res.success){
          showToast('Transaction received and forwarded.','success');
          loadData();
          setTimeout(function(){
            var targetPage = getPageKeyFromSheet(returnStateSnapshot.forwardTo);
            if (returnStateSnapshot.forwardTo !== 'END USER' && currentUser && currentUser.role === 'ADMIN' && typeof navigate === 'function') {
              navigate(targetPage);
              if (typeof switchTab === 'function') switchTab(targetPage, 'new');
              if (typeof switchNewSubTab === 'function') switchNewSubTab(targetPage, 'incoming');
            } else if (returnStateSnapshot.returnContext === 'dashboard') {
              switchDashboardDeptTab(returnStateSnapshot.returnPage || getPageKeyFromSheet(returnStateSnapshot.sheetName));
              switchDashboardTab('active');
            } else if (returnStateSnapshot.returnContext === 'myreqs') {
              switchMyReqsDeptTab(returnStateSnapshot.returnPage || getPageKeyFromSheet(returnStateSnapshot.sheetName));
              switchMyReqsTab('active');
            } else {
              switchTab(returnStateSnapshot.returnPage || getPageKeyFromSheet(returnStateSnapshot.sheetName), 'active');
            }
          }, 150);
        } else {
          showToast('Error: '+(res&&res.message||'Unknown'),'error');
        }
        modalState={};
      })
      .withFailureHandler(function(e){ btn.textContent='Receive & Forward'; btn.disabled=false; showToast('Error: '+e.message,'error'); })
      .receiveAndForwardReturnedTransaction(returnStateSnapshot.sheetName, returnStateSnapshot.rowNum, returnStateSnapshot.forwardTo, remarks, currentUser.username);
    return;
  }

  // ── CREATE mode ──
  if (modalState.mode==='create') {
    var data=readFormData(BAC_CREATE_FIELDS,'mf_');
    data['STATUS']='PROCESSING';
    var missingCreate=BAC_CREATE_FIELDS.filter(function(f){ return f.required&&!data[f.key]; });
    if(missingCreate.length){
      showToast('Please fill in: '+missingCreate.map(function(f){ return f.label; }).join(', '),'error');
      return;
    }
    btn.textContent='Creating…'; btn.disabled=true;
    google.script.run
      .withSuccessHandler(function(res){
        btn.textContent='Create Transaction'; btn.disabled=false;
        document.getElementById('main-modal').classList.remove('open');
        if(res&&res.success){
          showToast('✅ Transaction created! Tracking No.: '+res.trackingNo,'success');
          refreshSupplierDatalist();
          delete cachedRows['bac'];
          loadData();
        } else { showToast('Error: '+(res&&res.message||'Unknown'),'error'); }
        modalState={};
      })
      .withFailureHandler(function(e){ btn.textContent='Create Transaction'; btn.disabled=false; showToast('Server error: '+e.message,'error'); modalState={}; })
      .createTransaction(data, currentUser.username);
    return;
  }

  // ── DEPT EDIT mode ──
  var cfg=MODAL_CONFIGS[modalState.page]; if(!cfg) return;
  var editData=readFormData(cfg.fields,'mf_');
  var missing=cfg.fields.filter(function(f){ return f.required&&!editData[f.key]; });
  if(missing.length){ showToast('Please fill in: '+missing.map(function(f){ return f.label; }).join(', '),'error'); return; }

  if (modalState.page !== 'bac' && modalState.isNew) {
    editData['STATUS'] = 'PROCESSING';
  }

  btn.textContent='Saving…'; btn.disabled=true;
  var savedPage    = modalState.page;
  var savedRowNum  = modalState.rowNum;
  var savedIsNew   = modalState.isNew;
  var savedPrNo    = (savedPage === 'bac') ? (editData['P.R NO.'] || editData['P.R #'] || '') : null;
  var savedTracking= (savedPage === 'bac') ? ((getRowFromCache('bac', savedRowNum)||{})['TRACKING NO.'] || '') : '';

  google.script.run
    .withSuccessHandler(function(res){
      btn.textContent='Save Updates'; btn.disabled=false;
      document.getElementById('main-modal').classList.remove('open');
      if(res&&res.success){
        var msg = savedPage==='bac' ? '✅ BAC record saved.' : (savedIsNew ? '✅ Saved — Status set to PROCESSING.' : '✅ Record updated.');
        showToast(msg,'success');
        if (savedPage === 'bac' && savedTracking && savedPrNo !== null) {
          google.script.run.updatePrNumber(savedTracking, savedPrNo, currentUser.username);
        }
        refreshSupplierDatalist();
        tabState[savedPage] = 'active';
        loadData();
        setTimeout(function(){ switchTab(savedPage, 'active'); }, 200);
      } else {
        showToast('Error: '+(res&&res.message||'Unknown'),'error');
      }
      modalState={};
    })
    .withFailureHandler(function(e){
      btn.textContent='Save Updates'; btn.disabled=false;
      showToast('Server error: '+e.message,'error');
    })
    .updateTransaction(SHEET_NAMES[modalState.page], modalState.rowNum, editData, currentUser.username);
}

function getPageKeyFromSheet(sn){ var m={'BAC':'bac','SUPPLY AND PROPERTY':'supply','BUDGET':'budget','ACCOUNTING':'accounting','CASH':'cash','RCAO':'rcao','ARDA':'arda','END USER':'enduser'}; return m[sn]||'bac'; }

}
function forwardTargetOptions(sheetName){
  return RETURN_TARGETS.filter(function(opt){ return opt.value!==sheetName; });
}
function forwardTargetLabel(value){
  var found = RETURN_TARGETS.find(function(opt){ return opt.value===value; });
  return found ? found.label : value;
}

function openForwardModal(sheetName, rowNum){
  var pageKey=getPageKeyFromSheet(sheetName);
  var row=getRowFromCache(pageKey, rowNum);
  var defaultTarget = FORWARD_DEFAULT_TARGETS[sheetName] || '';
  var rowPr = row ? (row['P.R NO.'] || row['P.R #'] || '') : '';
  var idMeta=(row&&rowPr?'P.R NO.: '+rowPr:'')+(row&&row['TRACKING NO.']?((row&&rowPr?' · ':'')+'Tracking: '+row['TRACKING NO.']):'');
  fwdState={sheetName:sheetName,rowNum:rowNum};
  document.getElementById('fwd-modal-title').textContent='Forward Transaction';
  document.getElementById('fwd-modal-meta').textContent=
    (idMeta?idMeta:('Row #'+rowNum))+' · Cannot be undone.';
  var opts=forwardTargetOptions(sheetName).map(function(opt){ return '<option value="'+esc(opt.value)+'"'+(opt.value===defaultTarget?' selected':'')+'>'+esc2(opt.label)+'</option>'; }).join('');
  var body='<div class="form-grid">'+
    '<div class="form-group full"><label class="form-label">Forward To</label><select class="form-select" id="fwd-target"><option value="">— Select —</option>'+opts+'</select></div>'+
    '<div class="form-group full"><label class="form-label">Remarks</label><textarea class="form-textarea" id="fwd-remarks" placeholder="Add remarks for the target department (optional)" style="min-height:120px;"></textarea></div>'+ 
    '</div>';
  document.getElementById('fwd-modal-body').innerHTML=body;
  document.getElementById('forward-modal').classList.add('open');
}
function closeForwardModal(e){
  if(e&&e.target!==document.getElementById('forward-modal')) return;
  document.getElementById('forward-modal').classList.remove('open'); fwdState={};
}
function confirmForward(){
  var btn=document.getElementById('fwd-modal-save');
  var target=(document.getElementById('fwd-target')||{value:''}).value.trim();
  if(!target){ showToast('Please select a department to forward to.','error'); return; }
  var remarks=(document.getElementById('fwd-remarks')||{value:''}).value.trim();
  var extraD={'FORWARD REMARKS':remarks};
  btn.textContent='Forwarding…'; btn.disabled=true;
  google.script.run
    .withSuccessHandler(function(res){
      btn.textContent='Forward →'; btn.disabled=false;
      document.getElementById('forward-modal').classList.remove('open');
      if(res&&res.success){
        showToast('Forwarded to '+forwardTargetLabel(target)+'.','success');
        loadData();
        if (fwdState.sheetName === 'ACCOUNTING') setTimeout(function(){ switchTab('accounting','active'); }, 150);
      }
      else showToast('Error: '+(res&&res.message||'Unknown'),'error');
      fwdState={};
    })
    .withFailureHandler(function(e){ btn.textContent='Forward →'; btn.disabled=false; showToast('Error: '+e.message,'error'); })
    .smartForwardTransaction(fwdState.sheetName, fwdState.rowNum, target, extraD, currentUser.username);
}

function openReturnModal(sheetName, rowNum){
  var pageKey=getPageKeyFromSheet(sheetName);
  var row=getRowFromCache(pageKey, rowNum);
  returnState={sheetName:sheetName,rowNum:rowNum};
  document.getElementById('return-modal-title').textContent='Return Transaction';
  document.getElementById('return-modal-meta').textContent=(row&&(((row['P.R NO.']||row['P.R #']||'').trim())|| (row['TRACKING NO.']||'').trim()))
    ? (((row['P.R NO.']||row['P.R #'])?'P.R NO.: '+(row['P.R NO.']||row['P.R #']):'') + (row['TRACKING NO.']?(((row['P.R NO.']||row['P.R #'])?' · ':'')+'Tracking: '+row['TRACKING NO.']):''))
    : ('Row #'+rowNum);
  var opts=returnTargetOptions(sheetName).map(function(opt){ return '<option value="'+esc(opt.value)+'">'+esc2(opt.label)+'</option>'; }).join('');
  var body='<div class="form-grid">'+
    '<div class="form-group full"><label class="form-label">Return To</label><select class="form-select" id="return-target"><option value="">— Select —</option>'+opts+'</select></div>'+
    '<div class="form-group full"><label class="form-label">Remarks</label><textarea class="form-textarea" id="return-remarks" placeholder="State why this transaction is being returned" style="min-height:140px;"></textarea></div>'+
    '<div class="form-group full" style="margin-top:-4px;"><label style="display:flex;align-items:center;gap:8px;font-weight:600;color:var(--text2);cursor:pointer;"><input type="checkbox" id="return-mark-completed" style="width:16px;height:16px;"/> Return and mark as completed</label></div>'+
    '</div>';
  document.getElementById('return-modal-body').innerHTML=body;
  document.getElementById('return-modal').classList.add('open');
}
function closeReturnModal(e){
  if(e&&e.target!==document.getElementById('return-modal')) return;
  document.getElementById('return-modal').classList.remove('open'); returnState={};
}
function confirmReturn(){
  var btn=document.getElementById('return-modal-save');
  var target=(document.getElementById('return-target')||{value:''}).value.trim();
  var remarks=(document.getElementById('return-remarks')||{value:''}).value.trim();
  var markCompleted=(document.getElementById('return-mark-completed')||{checked:false}).checked;
  if(!target){ showToast('Please choose where to return this transaction.','error'); return; }
  if(!remarks){ showToast('Remarks are required when returning a transaction.','error'); return; }
  btn.textContent='Returning…'; btn.disabled=true;
  google.script.run
    .withSuccessHandler(function(res){
      btn.textContent='Return'; btn.disabled=false;
      document.getElementById('return-modal').classList.remove('open');
      if(res&&res.success){
        showToast('Transaction returned successfully.','success');
        loadData();
        if (returnState.sheetName === 'ACCOUNTING') setTimeout(function(){ switchTab('accounting','active'); }, 150);
      }
      else showToast('Error: '+(res&&res.message||'Unknown'),'error');
      returnState={};
    })
    .withFailureHandler(function(e){ btn.textContent='Return'; btn.disabled=false; showToast('Error: '+e.message,'error'); })
    .returnTransaction(returnState.sheetName, returnState.rowNum, target, remarks, currentUser.username, markCompleted);
}
function openCompleteReturnedModal(sheetName, rowNum, contextName, pageKey){
  var resolvedPage = pageKey || getPageKeyFromSheet(sheetName);
  var row = getRowFromCache(resolvedPage, rowNum);
  var context = contextName || 'page';
  modalState = {
    mode:'return-complete',
    sheetName:sheetName,
    rowNum:rowNum,
    returnContext:context,
    returnPage:resolvedPage
  };
  document.getElementById('main-modal-title').textContent='Receive';
  document.getElementById('main-modal-meta').textContent=(row&&(((row['P.R NO.']||row['P.R #']||'').trim())|| (row['TRACKING NO.']||'').trim()))
    ? (((row['P.R NO.']||row['P.R #'])?'P.R NO.: '+(row['P.R NO.']||row['P.R #']):'') + (row['TRACKING NO.']?(((row['P.R NO.']||row['P.R #'])?' · ':'')+'Tracking: '+row['TRACKING NO.']):''))
    : ('Row #'+rowNum);
  var forwardOpts = receiveForwardTargetOptions().filter(function(opt){
    return !(context === 'myreqs' && opt.value === 'END USER');
  }).map(function(opt){
    var label = opt.value === 'END USER' ? 'End User' : opt.label;
    return '<option value="'+esc(opt.value)+'">'+esc2(label)+'</option>';
  }).join('');
  document.getElementById('main-modal-body').innerHTML=
    '<div class="form-grid">'+
      (row&&returnedRemarksDisplayValue(row)!=='—'?'<div class="form-group full"><label class="form-label">Returner Remarks</label><div class="view-value" style="min-height:72px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);">'+esc2(returnedRemarksDisplayValue(row))+'</div></div>':'')+
      '<div class="form-group full"><label class="form-label">Forward Remarks <span class="req">*</span></label><textarea class="form-textarea" id="mf_return_complete_remarks" placeholder="Add forward remarks" style="min-height:140px;"></textarea></div>'+
      '<div class="form-group full"><label class="form-label">Forward To Department <span class="req">*</span></label><select class="form-select" id="mf_return_complete_forward_to"><option value="">— Select —</option>'+forwardOpts+'</select></div>'+
    '</div>';
  document.getElementById('main-modal-save').textContent='Receive & Forward';
  document.getElementById('main-modal-save').style.display='inline-flex';
  document.getElementById('main-modal-cancel').textContent='Cancel';
  document.getElementById('main-modal').classList.add('open');
}
function completeReturnedItem(sheetName, rowNum){
  openCompleteReturnedModal(sheetName, rowNum, 'page', getPageKeyFromSheet(sheetName));
}

function doMarkPaid(rowNum){
  if(!confirm('Mark this transaction as PAID? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function(res){ if(res&&res.success){ showToast('Marked as PAID!','success'); loadData(); } else showToast('Error: '+(res&&res.message||'Unknown'),'error'); })
    .withFailureHandler(function(e){ showToast('Error: '+e.message,'error'); })
    .markCompleted(rowNum, currentUser.username);
}
function doCancelTransaction(sheetName, rowNum){
  if(!confirm('Cancel this transaction? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function(res){ if(res&&res.success){ showToast('Transaction cancelled.','info'); loadData(); } else showToast('Error: '+(res&&res.message||'Unknown'),'error'); })
    .withFailureHandler(function(e){ showToast('Error: '+e.message,'error'); })
    .cancelTransaction(sheetName, rowNum, currentUser.username);
}
