<template id="tpl-suppliers">
  <div class="section-head">
    <div></div>
    <div class="section-actions">
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="suppliers-search" placeholder="Search suppliers…" oninput="filterSuppliersTable()"/></div>
      <button class="tb-btn btn-mgmt-export" onclick="showExportChoice(this,printSuppliersTable,csvExportSuppliersTable)" title="Export supplier list">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Export ▾
      </button>
      <button class="tb-btn primary" onclick="openAddSupplierModal()">＋ Add Supplier</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div><div class="panel-title">Suppliers</div><div class="panel-sub" id="suppliers-panel-sub"></div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Supplier Name</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="suppliers-tbody"><tr><td colspan="4"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
