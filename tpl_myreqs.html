<template id="tpl-myreqs">
  <div class="tab-nav">
    <button class="tab-btn" id="tab-myreqs-returned" onclick="switchMyReqsTab('returned')">↩ End-User Returns <span id="myreqs-count-returned" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-myreqs-active" onclick="switchMyReqsTab('active')">Active <span id="myreqs-count-active" class="badge badge-blue" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-myreqs-cancelled" onclick="switchMyReqsTab('cancelled')">Cancelled <span id="myreqs-count-cancelled" class="badge badge-down" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-myreqs-done" onclick="switchMyReqsTab('done')">Completed <span id="myreqs-count-done" class="badge badge-op" style="margin-left:4px;"></span></button>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div><div class="panel-title" id="myreqs-panel-title">Active Requests</div><div class="panel-sub" id="myreqs-sub"></div></div>
      <div class="panel-actions">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="myreqs-search" placeholder="Search tracking no., P.R #…" oninput="filterMyReqs()"/></div>
        <select class="form-select" id="myreqs-dept-filter" onchange="onMyReqsDeptFilterChange()" style="font-size:12.5px;padding:6px 10px;height:32px;min-width:130px;">
          <option value="all">All Depts</option>
          <option value="bac">BAC</option>
          <option value="supply">Supply</option>
          <option value="budget">Budget</option>
          <option value="accounting">Accounting</option>
          <option value="cash">Cashier</option>
          <option value="rcao">RCAO</option>
          <option value="arda">ARDA</option>
        </select>
        <select class="form-select" id="myreqs-cat-filter" onchange="onMyReqsCatFilterChange()" style="font-size:12.5px;padding:6px 10px;height:32px;min-width:120px;display:none;">
          <option value="All">All Categories</option>
          <option value="Regular">Regular</option>
          <option value="SPLIT">SPLIT</option>
          <option value="Agri-Agra">Agri-Agra</option>
          <option value="IPARC">IPARC</option>
        </select>
        <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="myreqs-thead"><tr><th>Tracking No.</th><th>P.R No.</th><th>Loading…</th></tr></thead>
      <tbody id="myreqs-tbody"><tr><td colspan="9"><div class="loading"><div class="spinner"></div> Loading your requests…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
