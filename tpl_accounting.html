<template id="tpl-accounting">
  <div class="section-head">
    <div>
      <div class="bac-cat-filter">
        <span class="bac-cat-filter-label">Category:</span>
        <button class="cat-chip active" onclick="filterBacCategory('All')">All</button>
        <button class="cat-chip" onclick="filterBacCategory('Regular')">Regular</button>
        <button class="cat-chip" onclick="filterBacCategory('SPLIT')">SPLIT</button>
        <button class="cat-chip" onclick="filterBacCategory('Agri-Agra')">Agri-Agra</button>
        <button class="cat-chip" onclick="filterBacCategory('IPARC')">IPARC</button>
      </div>
    </div>     
      <div class="search-wrap"><span class="search-icon">🔍</span><input id="acctg-search" placeholder="Search…" oninput="filterRows('accounting')"/></div>
      <button class="tb-btn" onclick="loadData()">↺ Refresh</button>
    </div>
  </div>
  
  <div class="tab-nav">
    <button class="tab-btn" id="tab-accounting-new" onclick="switchNewSubTab('accounting','incoming')">🔔 New <span id="accounting-new-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn active" id="tab-accounting-active" onclick="switchTab('accounting','active')">Active <span id="accounting-active-count" class="badge badge-amber" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-accounting-done" onclick="switchTab('accounting','done')">Completed <span id="accounting-done-count" class="badge badge-grey" style="margin-left:4px;"></span></button>
  </div>
  <div class="tab-subnav" id="accounting-new-subtabs" style="display:none;margin-top:8px;">
    <button class="tab-btn active" id="tab-accounting-new-sub-incoming" onclick="switchNewSubTab('accounting','incoming')">New Transactions <span id="accounting-new-incoming-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
    <button class="tab-btn" id="tab-accounting-new-sub-returns" onclick="switchNewSubTab('accounting','returns')">Return Transactions <span id="accounting-new-returns-count" class="badge badge-warn" style="margin-left:4px;"></span></button>
  </div>
  <div class="panel" id="accounting-table-panel">
    <div class="panel-header">
      <div><div class="panel-title">Active Transactions</div><div class="panel-sub" id="acctg-panel-sub"></div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead id="accounting-thead"><tr>
        <th>Tracking No.</th><th>P.R No.</th><th>Date Received</th><th>DV No.</th>
        <th>Net Amount</th><th>TAX Amount</th><th>Status</th><th class="th-completed-at">Completed At</th><th>Actions</th>
      </tr></thead>
      <tbody id="acctg-tbody"><tr><td colspan="10"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr></tbody>
    </table></div>
  </div>
</template>
